                <span style={{ fontSize:15, fontWeight:700, fontFamily:SERIF, color:C.danger, letterSpacing:-0.3 }}>{fmtD(totalTax)}</span>
                <span style={{ fontSize:8, color:C.textDim, fontFamily:SERIF, fontStyle:"italic" }}>{effectiveRate}%</span>
              </div>
            </div>
            <div style={{ flex:1, padding:"4px 8px", background:C.armLight, display:"flex", flexDirection:"column", justifyContent:"center" }}>
              <div style={{ fontSize:7, color:C.arm, fontWeight:700, letterSpacing:0.8, textTransform:"uppercase" }}>{isEn?"With 1031 (save)":"做1031 (节税)"}</div>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline" }}>
                <span style={{ fontSize:15, fontWeight:700, fontFamily:SERIF, color:C.arm, letterSpacing:-0.3 }}>{fmtD(totalTax)}</span>
                <span style={{ fontSize:8, color:C.textDim, fontFamily:SERIF, fontStyle:"italic" }}>{isEn?"deferred":"延税"}</span>
              </div>
            </div>
          </div>
          {/* Tax Breakdown — 2 columns */}
          <div style={{ padding:"6px 8px", background:C.cardAlt, borderRadius: 0, marginBottom:5 }}>
            <div style={{ fontSize:8, fontWeight:700, marginBottom:3, letterSpacing:1.2, textTransform:"uppercase", color:C.textSec }}>{isEn?"Tax Breakdown":"税额明细"}</div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", columnGap:10, rowGap:1 }}>
              {[
                {l:isEn?"Adj Basis":"调整基础", v:fmtD(adjustedBasis), c:C.textSec},
                {l:isEn?"Total Gain":"总收益", v:fmtD(totalGain), c:C.warn},
                {l:`CG ${(fedCGRate*100)}%`, v:fmtD(fedCGTax), c:C.danger},
                {l:`${isEn?"Dep Recap":"折旧回收"} 25%`, v:fmtD(depRecapTax), c:C.danger},
                ...(niitTax > 0 ? [{l:"NIIT 3.8%", v:fmtD(niitTax), c:C.danger}] : []),
                {l:`${taxingInfo.label} ${(stateRate*100).toFixed(1)}%`, v:fmtD(stateTax), c:C.danger},
              ].map((r,i) => <div key={i} style={{ display:"flex", justifyContent:"space-between", padding:"1px 0", borderBottom:`0.5px dotted ${C.borderLight}` }}>
                <span style={{ fontSize:8, color:C.textSec }}>{r.l}</span>
                <span style={{ fontSize:9, fontWeight:700, fontFamily:MONO, color:r.c }}>{r.v}</span>
              </div>)}
            </div>
            <div style={{ display:"flex", justifyContent:"space-between", padding:"3px 0 0", borderTop:`0.5px solid ${C.danger}`, marginTop:3 }}>
              <span style={{ fontSize:9, fontWeight:700 }}>{isEn?"TOTAL":"总税额"}</span>
              <span style={{ fontSize:11, fontWeight:700, fontFamily:MONO, color:C.danger }}>{fmtD(totalTax)}</span>
            </div>

          {/* Cost Basis Detail (collapsible) */}

            <span style={{ fontSize:9, fontWeight:700, letterSpacing:1.2, textTransform:"uppercase" }}>{isEn?"+ Cost Basis & Dep Detail":"+ 成本基础与折旧明细"}</span>
            <span style={{ fontSize:10, color:C.textDim, transform:showDepDetail?"rotate(180deg)":"", transition:"transform .2s" }}>{"\u2304"}</span>
          </button>

              {[
                {l:isEn?"Purchase Price":"购入价", v:fmtD(purchasePrice)},
                {l:isEn?"+ Improvements":"+ 改造", v:fmtD(improvements)},
                {l:isEn?"= Total Cost":"= 总成本", v:fmtD(purchasePrice+improvements), bold:true},
                {l:isEn?"Land (15%)":"土地（15%不折旧）", v:fmtD(Math.round((purchasePrice+improvements)*0.15))},
                {l:isEn?"Depreciable Basis":"可折旧基础（85%）", v:fmtD(Math.round(depBasis)), bold:true},
                {l:isEn?"Annual Dep":"年折旧", v:fmtD(Math.round(annualDep)) + " /" + depLife + (isEn?"y":"年")},
                {l:isEn?"Total Dep Claimed":"累计已折旧", v:fmtD(totalDep), bold:true, color:C.danger},
                {l:isEn?"= Adjusted Basis":"= 调整后基础", v:fmtD(adjustedBasis), bold:true, color:C.arm},
              ].map((r,i) => <div key={i} style={{ display:"flex", justifyContent:"space-between", padding:"1px 0", borderBottom:r.bold?"none":`0.5px dashed ${C.borderLight}` }}>
                <span style={{ color:C.textSec, fontSize:9 }}>{r.l}</span>
                <span style={{ fontWeight:r.bold?700:400, fontFamily:MONO, color:r.color||C.text, fontSize:10 }}>{r.v}</span>

                  {(isEn?["Year","Mo","Dep","Cum"]:["年份","月","折旧","累计"]).map(h => <th key={h} style={{ padding:"2px 3px", textAlign:"right", fontWeight:600, color:C.textDim, borderBottom:`0.5px solid ${C.border}` }}>{h}</th>)}
                </tr></thead>
                <tbody>{calcDep.years.map((d,i) => <tr key={i} style={{ background:i%2===0?"transparent":C.cardAlt }}>

            {day:0, label:isEn?"Close Sale":"完成出售", desc:isEn?"Close on relinquished property. Proceeds go to QI.":"完成旧物业出售。收益转入QI托管。", color:C.warn, icon:""},

          ].map((step,i) => <div key={i} style={{ display:"flex", gap:8, marginBottom:i<2?10:0 }}>
            <div style={{ display:"flex", flexDirection:"column", alignItems:"center", minWidth:24 }}>
              <div style={{ width:22, height:22, borderRadius:"50%", background:step.color+"18", display:"flex", alignItems:"center", justifyContent:"center", fontSize:12 }}>{step.icon}</div>
              {i < 2 && <div style={{ width:1, flex:1, background:C.border, marginTop:3 }} />}
            </div>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:11, fontWeight:700, color:step.color, fontFamily:SERIF, fontStyle:"italic" }}>{step.label}</div>
              <div style={{ fontSize:9, color:C.textSec, lineHeight:1.4, marginTop:1 }}>{step.desc}</div>
            </div>
          </div>)}
        </div>}
      </div>

      <div style={{ padding:"6px 12px 0" }}><GlossarySection terms={EXCHANGE_GLOSSARY} en={isEn} /></div>
      <BrandingFooter />
    </div>
  );
}


function App() {
  const [page, setPage] = React.useState("home");
  const [lang, setLang] = React.useState("cn");
  const [theme, setThemeState] = React.useState("paperwhite");

  const setTheme = (t) => { setThemeState(t); applyTheme(t); };

  React.useEffect(() => {
    const stored = getStoredTheme();
    setThemeState(stored);
    applyTheme(stored);
  }, []);

  const navigate = (p) => {
    try { window.history.pushState({ page: p }, "", "#" + p); } catch(e) {}
    setPage(p);
  };
  const goHome = () => {
    try { window.history.pushState({ page: "home" }, "", "#"); } catch(e) {}
    setPage("home");
  };

  React.useEffect(() => {
    try {
      const handler = (e) => {
        if (e.state && e.state.page) setPage(e.state.page);
        else setPage("home");
      };
      window.addEventListener("popstate", handler);
      const h = (window.location.hash || "").replace("#", "");
      if (h && ["estimate","arm","points","refi","exchange"].includes(h)) {
        setPage(h);
        window.history.replaceState({ page: h }, "", "#" + h);
      }
      return () => window.removeEventListener("popstate", handler);
    } catch(e) {}
  }, []);

  if (page === "estimate") return <SettingsContext.Provider value={{ theme, setTheme, lang, setLang }}><MortgageEstimator onBack={goHome} lang={lang} /></SettingsContext.Provider>;
  if (page === "arm") return <SettingsContext.Provider value={{ theme, setTheme, lang, setLang }}><ArmNavigator onBack={goHome} lang={lang} /></SettingsContext.Provider>;
  if (page === "points") return <SettingsContext.Provider value={{ theme, setTheme, lang, setLang }}><PointsAnalyzer onBack={goHome} lang={lang} /></SettingsContext.Provider>;
  if (page === "refi") return <SettingsContext.Provider value={{ theme, setTheme, lang, setLang }}><RefiAnalyzer onBack={goHome} lang={lang} /></SettingsContext.Provider>;
  if (page === "exchange") return <SettingsContext.Provider value={{ theme, setTheme, lang, setLang }}><ExchangeAnalyzer onBack={goHome} lang={lang} /></SettingsContext.Provider>;
  return <SettingsContext.Provider value={{ theme, setTheme, lang, setLang }}><HomePage onNavigate={navigate} lang={lang} setLang={setLang} theme={theme} setTheme={setTheme} /></SettingsContext.Provider>;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
