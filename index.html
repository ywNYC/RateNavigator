                        style={{ flex:1, minWidth:0, padding:"3px 4px", borderRadius: 0, border:"1px solid "+inp.color+"50", fontSize:11, fontFamily:MONO, fontWeight:700, textAlign:"center", outline:"none", background:C.white, color:inp.color, boxSizing:"border-box" }} />
                      {/* Sync price from A — only shows on B/C when price differs */}
                      {i > 0 && inp.price !== homePrice && (
                        <button
                          onClick={() => inp.setPrice(homePrice)}
                          title={isEn?`Use A's price (${fmtD(homePrice)})`:`用 A 的房价 (${fmtD(homePrice)})`}
                          style={{
                            flexShrink:0, width:18, height:18, padding:0, borderRadius:0,
                            border:`0.5px solid ${C.arm}`, cursor:"pointer",
                            background: C.armLight, color: C.arm,
                            fontSize:10, fontFamily:SERIF, fontWeight:700, lineHeight:1,
                            display:"flex", alignItems:"center", justifyContent:"center",
                          }}
                        >⇠</button>
                      )}
                    </div>
                    {/* Down: slider + input */}
                    {row(isEn?"Dn":"首付", inp.downPct, 3, 50, 1, inp.setDown, inp.color, v=>v, "numeric", "%")}
                    {/* Rate: slider + input */}
                    {row(isEn?"Rate":"利率", inp.rate, 3, 10, 0.125, inp.setRate, inp.color, v=>v.toFixed(2), "decimal", "%")}
                    {/* Points: slider + input */}
                    {row(isEn?"Pts":"买点", inp.points, 0, 3, 0.125, inp.setPoints, C.purple, v=>String(v), "decimal", "pt")}
                    {inp.points > 0 && <div style={{ fontSize:7, color:C.purple, textAlign:"right", marginTop:-1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}><span style={{ color:C.textMuted, fontStyle:"italic", fontFamily:SERIF }}>{isEn?"cost ":"买点费 "}</span>{fmtD(Math.round(inp.points*0.01*Math.round(inp.price*(1-inp.downPct/100))))}</div>}
                  </div>
                );
              })}
            </div>
            {/* Swap-confirmation toast — fades in/out for 1.2s */}
            {recentSwap && (
              <div style={{
                position:"fixed", top:"40%", left:"50%",
                transform:"translate(-50%, -50%)",

                border:`2px solid ${C.ink}`,
                boxShadow:"0 8px 32px rgba(0,0,0,0.3)",

            <style>{`@keyframes swapToast{0%{opacity:0;transform:translate(-50%,-50%) scale(0.9)}15%{opacity:1;transform:translate(-50%,-50%) scale(1)}75%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-60%) scale(0.95)}}
@keyframes dragHandleHint{0%,100%{opacity:0.7;transform:scale(1)}50%{opacity:1;transform:scale(1.15)}}`}</style>
            {/* Floating ghost card that follows the finger during drag */}
            {dragPos && ghostCard && (
              <div style={{
                position:"fixed",
                left: dragPos.x - dragPos.offsetX,
                top: dragPos.y - dragPos.offsetY,
                width: ghostCard.width,
                minHeight: ghostCard.height,
                padding:"5px 4px 4px",
                background: ghostCard.bg,
                border: `2px solid ${ghostCard.color}`,
                borderRadius: 0,
                pointerEvents: "none",
                zIndex: 9999,
                transform: "scale(1.08) rotate(-1.5deg)",
                boxShadow: `0 12px 32px rgba(0,0,0,0.25), 0 0 0 1px ${ghostCard.color}`,
                opacity: 0.94,
                transition: "transform 0.08s ease-out",
              }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:3 }}>
                  <span style={{ display:"flex", alignItems:"center", gap:6 }}>
                    <span style={{ fontSize:16, color:ghostCard.color, fontFamily:MONO, fontWeight:700, lineHeight:1 }}>⠿</span>
                    <span style={{ fontSize:11, fontWeight:700, color:ghostCard.color }}>{ghostCard.label}</span>
                  </span>
                </div>
                <div style={{ fontSize:10, fontFamily:MONO, fontWeight:700, color:ghostCard.color, textAlign:"center", padding:"3px 4px", border:`1px solid ${ghostCard.color}50`, background:C.white, marginBottom:3 }}>
                  {fmtD(ghostCard.price)}
                </div>
                <div style={{ fontSize:9, color:C.textSec, display:"flex", justifyContent:"space-between", padding:"1px 2px" }}>
                  <span>{isEn?"Dn":"首付"}</span>
                  <span style={{ fontFamily:MONO, color:ghostCard.color, fontWeight:600 }}>{ghostCard.downPct}%</span>
                </div>
                <div style={{ fontSize:9, color:C.textSec, display:"flex", justifyContent:"space-between", padding:"1px 2px" }}>
                  <span>{isEn?"Rate":"利率"}</span>
                  <span style={{ fontFamily:MONO, color:ghostCard.color, fontWeight:600 }}>{ghostCard.rate.toFixed(3)}%</span>
                </div>
                <div style={{ fontSize:9, color:C.textSec, display:"flex", justifyContent:"space-between", padding:"1px 2px" }}>
                  <span>{isEn?"Pts":"买点"}</span>
                  <span style={{ fontFamily:MONO, color:C.purple, fontWeight:600 }}>{ghostCard.points}pt</span>
                </div>
              </div>
            )}
            <div style={{ fontSize:8, color:C.textMuted, textAlign:"center", fontFamily:SERIF, fontStyle:"italic", marginTop:-2, marginBottom:4, letterSpacing:0.3 }}>
              {dragSrc !== null
                ? (isEn ? "▸ drop on another slot to swap" : "▸ 拖到另一个方案上松开即可交换")
                : (isEn ? "Long-press ⠿ to drag a scenario into another slot" : "长按 ⠿ 图标拖动方案到另一个位置交换")}
            </div>
            {/* Comparison table removed — see report for full compare table */}
          </div>
        );
      })()}

      {/* Regular inputs - hidden in compare mode */}
      {!compareMode && <div style={{ padding:"8px 16px 0" }}>
        <div style={{ background:C.white, borderRadius: 0, padding:14, marginBottom:10, boxShadow:C.shadow }}>
          <AmountSlider label={isEn?"Home Price":"房价"} value={homePrice} onChange={setHomePrice} min={100000} max={3000000} step={25000} color={C.arm} />
          <div style={{ marginBottom:10 }}>
            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
              <span style={{ fontSize:11, color:C.textDim }}>{isEn?"Down Payment":"首付比例"}{downPct < 20 && <span style={{ fontSize:9, color:C.warn, fontWeight:700, marginLeft:6, padding:"1px 6px", background:C.warnLight, borderRadius: 0 }}>{isEn?"\u26A0 PMI":"\u26A0 需PMI"}</span>}</span>
              <span style={{ fontSize:12, fontWeight:700, fontFamily:MONO }}>{downPct}% ({fmtD(downAmount)})</span>
            </div>
            <input type="range" min={3} max={50} step={1} value={downPct} onChange={e => setDownPct(Number(e.target.value))}
              style={{ width:"100%", height:2, borderRadius:0, outline:"none", appearance:"none", WebkitAppearance:"none", cursor:"pointer", background:`linear-gradient(to right,${C.arm} 0%,${C.arm} ${((downPct-3)/47)*100}%,${C.borderLight} ${((downPct-3)/47)*100}%,${C.borderLight} 100%)` }} />
            {downPct < 20 && <div style={{ fontSize:9, color:C.warn, marginTop:3, fontWeight:500 }}>{isEn?`LTV ${ltv.toFixed(1)}% > 80%, lender requires PMI until balance reaches 78% of price`:`LTV ${ltv.toFixed(1)}% > 80%，银行要求缴PMI直到余额降至房价的78%`}</div>}
          </div>
          <div style={{ marginBottom:10 }}>
            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
              <span style={{ fontSize:11, color:C.textDim }}>{isEn?"Interest Rate":"利率"}</span>
              <span style={{ fontSize:12, fontWeight:700, fontFamily:MONO }}>{rate.toFixed(3)}%</span>
            </div>
            <input type="range" min={3} max={10} step={0.125} value={rate} onChange={e => setRate(Number(e.target.value))}
              style={{ width:"100%", height:2, borderRadius:0, outline:"none", appearance:"none", WebkitAppearance:"none", cursor:"pointer", background:`linear-gradient(to right,${C.fixed} 0%,${C.fixed} ${((rate-3)/7)*100}%,${C.borderLight} ${((rate-3)/7)*100}%,${C.borderLight} 100%)` }} />
          </div>
          <div style={{ marginBottom:10 }}>
            <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
              <span style={{ fontSize:11, color:C.textDim }}>{isEn?"Discount Points":"买点数"}</span>
              <span style={{ fontSize:12, fontWeight:700, fontFamily:MONO }}>{points} {isEn?"pt":"点"}{points > 0 ? " ("+fmtD(Math.round(points*0.01*loanAmount))+")" : ""}</span>
            </div>
            <input type="range" min={0} max={3} step={0.125} value={points} onChange={e => setPoints(Number(e.target.value))}
              style={{ width:"100%", height:2, borderRadius:0, outline:"none", appearance:"none", WebkitAppearance:"none", cursor:"pointer", background:`linear-gradient(to right,${C.purple} 0%,${C.purple} ${(points/3)*100}%,${C.borderLight} ${(points/3)*100}%,${C.borderLight} 100%)` }} />
            {points > 0 && <div style={{ fontSize:9, color:C.purple, marginTop:3, fontWeight:500 }}>{isEn?`Base rate ${(rate+points*RATE_PER_POINT).toFixed(3)}% → Quoted ${rate.toFixed(3)}% · Point cost ${fmtD(Math.round(points*0.01*loanAmount))} added to closing`:`基础利率 ${(rate+points*RATE_PER_POINT).toFixed(3)}% → 报价 ${rate.toFixed(3)}% · 买点费用 ${fmtD(Math.round(points*0.01*loanAmount))} 计入过户`}</div>}
          </div>
          <div style={{ marginBottom:10 }}>
            <div style={{ fontSize:11, color:C.textDim, fontWeight:600, marginBottom:4 }}>{isEn?"Loan Term":"贷款期限"}</div>
            <div style={{ display:"flex", gap:4, background:C.cardAlt, borderRadius: 0, padding:2 }}>
              {[15,20,30].map(y => { const a=y===termYears; return <button key={y} onClick={() => setTermYears(y)} style={{ flex:1, padding:"7px 2px", borderRadius: 0, border:"none", cursor:"pointer", background:a?C.ink:"transparent", boxShadow:a?C.shadow:"none", fontSize:12, fontWeight:a?700:500, color:a?C.paper:C.textSec, fontFamily:FONT }}>{y}{isEn?"yr":"年"}</button>; })}
            </div>
          </div>
        </div>
      </div>}

      {/* Shared settings - always visible */}
      <div style={{ padding:"8px 16px 0" }}>
        {/* Monthly Breakdown removed — see report for full donut + itemized breakdown */}

        {/* Combined card: Monthly (left) + Cash (middle) + A/B/C selector (right) */}
        {(() => {
          const mainAllSc = compareMode
            ? [scenarioA, ...scenarios.map((s, i) => calcScenarioAligned(s.price, s.downPct, s.rate, s.points, { insOverride:s.insOverride, hoaOverride:s.hoaOverride, utilityOverride:s.utilityOverride, taxRateOverride:s.taxRateOverride }, i+1))]
            : [scenarioA];
          const mainHV = Math.min(heroView, mainAllSc.length - 1);
          const cur = mainAllSc[mainHV];
          const scColors = [C.arm, C.fixed, C.warn];
          const curColor = scColors[mainHV];
          const scLabels2 = ["A", ...scenarios.map((_, i) => String.fromCharCode(66 + i))];
          const showSelector = compareMode && mainAllSc.length > 1;
          return (
            <div style={{ width:"100%", marginBottom:10, background:C.cardAlt, borderRadius:0, border:`0.5px solid ${C.ink}`, fontFamily:FONT, display:"flex", alignItems:"stretch" }}>
              {/* LEFT: Monthly */}
              <div style={{ flex:1, minWidth:0, textAlign:"center", padding:"12px 6px", display:"flex", flexDirection:"column", justifyContent:"center" }}>
                <div style={{ fontSize:9, color:C.ink, fontWeight:700, letterSpacing:1.5, textTransform:"uppercase" }}>{isEn?"Monthly":"月供"}</div>
                <div style={{ fontSize:26, fontWeight:600, fontFamily:SERIF, color:curColor, margin:"4px 0", letterSpacing:-0.4, lineHeight:1 }}>{fmtD(cur.total)}</div>
                <div style={{ fontSize:8, color:C.textDim, fontFamily:SERIF, fontStyle:"italic", lineHeight:1.3 }}>
                  {fmtD(cur.pi)} {isEn?"P&I":"本息"}<br/>+ {fmtD(cur.total - cur.pi)} {isEn?"tax/ins/etc":"税/险/其他"}
                </div>
              </div>
              {/* MIDDLE: Cash (clickable → opens modal for selected scenario) */}
              <button onClick={()=>setClosingModalIdx(mainHV)} style={{
                flex:1.15, minWidth:0, textAlign:"center", padding:"12px 6px",
                borderTop:"none", borderBottom:"none",
                borderLeft:`0.5px solid ${C.ink}40`,
                borderRight: showSelector ? `0.5px solid ${C.ink}40` : "none",
                background:"transparent", cursor:"pointer", fontFamily:FONT,
                display:"flex", flexDirection:"column", justifyContent:"center",
              }}>
                <div style={{ fontSize:9, color:C.ink, fontWeight:700, letterSpacing:1.5, textTransform:"uppercase" }}>{isEn?"Cash":"过户现金"}</div>
                <div style={{ fontSize:26, fontWeight:600, fontFamily:SERIF, color:curColor, margin:"4px 0", letterSpacing:-0.4, lineHeight:1 }}>{fmtD(cur.cash)}</div>
                <div style={{ display:"flex", justifyContent:"center", alignItems:"center", gap:12 }}>
                  <div style={{ fontSize:8, color:C.textDim, fontFamily:SERIF, fontStyle:"italic", lineHeight:1.3, textAlign:"right" }}>{fmtD(cur.down)} {isEn?"down":"首付"}<br/>+ {fmtD(cur.closing)} {isEn?"closing":"过户费"}</div>
                  <div style={{ padding:"1px 6px", background:"transparent", border:`1px solid ${curColor}`, color:curColor, fontSize:8, fontWeight:700, letterSpacing:0.8, textTransform:"uppercase", fontFamily:FONT, lineHeight:1.4, whiteSpace:"nowrap" }}>{isEn?"+ detail":"+ 明细"}</div>
                </div>
              </button>
              {/* RIGHT: A/B/C selector */}
              {showSelector && (
                <div style={{ width:48, display:"flex", flexDirection:"column", padding:"8px 6px", gap:4, justifyContent:"center" }}>
                  {mainAllSc.map((_, i) => {
                    const active = i === mainHV;
                    const col = scColors[i];
                    return (
                      <button key={i} onClick={()=>setHeroView(i)} style={{
                        flex:1, padding:"4px 0", minHeight:26,
                        background: active ? col : "transparent",
                        color: active ? C.paper : col,
                        border: `1px solid ${col}`,
                        cursor:"pointer",
                        fontSize:14, fontFamily:SERIF, fontStyle: active ? "italic" : "normal",
                        fontWeight:700, letterSpacing:0.5,
                        borderRadius:0, lineHeight:1,
                        boxShadow: active ? `0 0 0 1px ${col}40` : "none",
                      }}>{scLabels2[i]}</button>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })()}


        {/* Property Type + Location + Credit — moved to bottom as secondary config */}
        <div style={{ background:C.white, borderRadius: 0, padding:"8px 12px 9px", marginBottom:10, boxShadow:C.shadow }}>
          <div style={{ display:"flex", gap:5, alignItems:"center" }}>
            <select value={propType} onChange={e => { setPropType(e.target.value); setHoaOverride(null); }} style={{ flex:0.85, minWidth:0, padding:"5px 4px", borderRadius: 0, border:"1px solid "+C.border, fontSize:11, fontFamily:FONT, background:C.white, outline:"none", fontWeight:600 }}>
              <option value="sfh">{isEn?"SFH":"独立屋"}</option>
              <option value="condo">Condo</option>
              <option value="coop">Co-op</option>
              <option value="townhouse">{isEn?"Townhouse":"联排屋"}</option>
            </select>
            <select value={state} onChange={e => { setState(e.target.value); setLocationPreset("state_avg"); setCustomTaxRate(null); setInsOverride(null); }} style={{ flex:0.85, minWidth:0, padding:"5px 4px", borderRadius: 0, border:"1px solid "+C.border, fontSize:11, fontFamily:FONT, background:C.white, outline:"none" }}>
              {Object.keys(STATE_PROP_TAX).sort().map(k => <option key={k} value={k}>{k} · {STATE_PROP_TAX[k]}%</option>)}
            </select>
            {pmiApplies && <select value={creditScore} onChange={e => setCreditScore(e.target.value)} style={{ flex:0.7, minWidth:0, padding:"5px 4px", borderRadius: 0, border:"1px solid "+C.border, fontSize:11, fontFamily:FONT, background:C.white, outline:"none" }}>
              <option value="760">760+</option>
              <option value="740">740-759</option>
              <option value="720">720-739</option>
              <option value="700">700-719</option>
              <option value="680">680-699</option>
              <option value="660">660-679</option>
              <option value="640">640-659</option>
              <option value="620">620-639</option>
            </select>}
            {propType !== "coop" && <select value={locationPreset} onChange={e => { setLocationPreset(e.target.value); if (e.target.value !== "custom") setCustomTaxRate(null); }} style={{ flex:1.3, minWidth:0, padding:"5px 4px", borderRadius: 0, border:"1px solid "+C.border, fontSize:11, fontFamily:FONT, background:C.white, outline:"none" }}>
              {displayPresets.map(p => <option key={p.k} value={p.k}>{p.l} · {p.rate.toFixed(2)}%</option>)}
            </select>}
          </div>
          {/* Tiny captions + indicators */}
          <div style={{ display:"flex", gap:5, alignItems:"baseline", marginTop:3, fontSize:8, color:C.textMuted, letterSpacing:0.3 }}>
            <span style={{ flex:0.85, fontFamily:SERIF, fontStyle:"italic" }}>{isEn?"type":"房屋类型"}</span>
            <span style={{ flex:0.85, fontFamily:SERIF, fontStyle:"italic" }}>{isEn?"state":"所在州"}</span>
            {pmiApplies && <span style={{ flex:0.7, fontFamily:SERIF, fontStyle:"italic" }}><span style={{ color:C.warn, fontWeight:700, fontStyle:"normal", fontFamily:MONO }}>PMI {pmiRateAnnual}%</span></span>}
            {propType !== "coop" && <span style={{ flex:1.3, fontFamily:SERIF, fontStyle:"italic" }}>{isEn?"local":"本地"} · <span style={{ color:C.fixed, fontWeight:700, fontStyle:"normal", fontFamily:MONO }}>{fmtD(Math.round(homePrice*effectiveTaxRate/100/12))}/mo</span></span>}
          </div>
          {currentPreset.note && currentPreset.note.startsWith("⚠") && <div style={{ fontSize:8, color:C.warn, marginTop:3, lineHeight:1.35, fontStyle:"italic", fontWeight:600 }}>{currentPreset.note}</div>}
        </div>

        {/* Advanced overrides — horizontal compact */}
        <div style={{ background:C.cardAlt, borderRadius: 0, padding:"9px 12px 10px", marginBottom:10, border:`0.5px solid ${C.ink}` }}>
          <div style={{ fontSize:9, color:C.ink, fontWeight:700, marginBottom:6, letterSpacing:2, textTransform:"uppercase", borderBottom:`0.5px solid ${C.ink}`, paddingBottom:3 }}>{isEn?"Fine-tune · optional":"精细调整 · 可选"}</div>
          {(() => {
            const showHoa = propType !== "sfh" || hoaMonthly > 0;
            const cells = [];
            if (propType !== "coop") cells.push({
              label: isEn?"Tax Rate":"地税率",
              value: <span style={{ fontFamily:SERIF, color:C.fixed }}>{effectiveTaxRate.toFixed(2)}<span style={{ fontSize:9, opacity:0.7 }}>%</span></span>,
              sub: <span style={{ color:C.textMuted }}>{fmtD(taxMonthly)}/mo</span>,
              slider: { min:0.2, max:3.0, step:0.05, value:effectiveTaxRate, color:C.fixed, onChange:v => { setCustomTaxRate(v); setLocationPreset("custom"); } },
            });
            cells.push({
              label: isEn?"Ins /mo":"保险/月",
              value: <span style={{ fontFamily:SERIF, color:C.purple }}>{fmtD(insMonthly)}</span>,
              sub: insOverride===null ? <span style={{ color:C.textMuted, fontStyle:"italic" }}>{isEn?"auto":"自动"}</span> : null,
              slider: { min:0, max:500, step:10, value:insMonthly, color:C.purple, onChange:setInsOverride },
            });
            if (showHoa) cells.push({
              label: isEn?(propType==="coop"?"Maint /mo":"HOA /mo"):(propType==="coop"?"管理费/月":"HOA/月"),
              value: <span style={{ fontFamily:SERIF, color:C.danger }}>{fmtD(hoaMonthly)}</span>,
              sub: hoaOverride===null ? <span style={{ color:C.textMuted, fontStyle:"italic" }}>{isEn?"est.":"估算"}</span> : null,
              slider: { min:0, max:propType==="coop"?5000:2500, step:25, value:hoaMonthly, color:C.danger, onChange:setHoaOverride },
            });
            cells.push({
              label: isEn?"Util /mo":"公用费/月",
              value: <span style={{ fontFamily:SERIF, color:C.warn }}>{fmtD(utilityMonthly)}</span>,
              sub: (utilityMonthly===0 && propType==="coop") ? <span style={{ color:C.textMuted, fontStyle:"italic" }}>{isEn?"in fees":"含管理费"}</span> : (!utilityUserSet ? <span style={{ color:C.textMuted, fontStyle:"italic" }}>{isEn?"est.":"估算"}</span> : null),
              slider: { min:0, max:800, step:10, value:utilityMonthly, color:C.warn, onChange:v => { setUtilityMonthly(v); setUtilityUserSet(true); } },
            });
            return (
              <>
                <div style={{ display:"flex", gap:6 }}>
                  {cells.map((c, i) => {
                    const pct = ((c.slider.value - c.slider.min) / (c.slider.max - c.slider.min)) * 100;
                    return (
                      <div key={i} style={{ flex:1, minWidth:0, display:"flex", flexDirection:"column" }}>
                        <div style={{ fontSize:8, color:C.textSec, fontWeight:600, letterSpacing:0.3, marginBottom:2, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{c.label}</div>
                        <div style={{ fontSize:13, fontWeight:600, letterSpacing:-0.3, lineHeight:1.1, marginBottom:1 }}>{c.value}</div>
                        <div style={{ fontSize:8, fontFamily:SERIF, minHeight:10, marginBottom:4 }}>{c.sub}</div>
                        <input type="range" min={c.slider.min} max={c.slider.max} step={c.slider.step} value={c.slider.value} onChange={e => c.slider.onChange(Number(e.target.value))}
                          style={{ width:"100%", height:2, borderRadius:0, outline:"none", appearance:"none", WebkitAppearance:"none", cursor:"pointer", background:`linear-gradient(to right,${c.slider.color} 0%,${c.slider.color} ${pct}%,${C.borderLight} ${pct}%,${C.borderLight} 100%)` }} />
                      </div>
                    );
                  })}
                </div>
                <div style={{ fontSize:8, color:C.textMuted, marginTop:6, lineHeight:1.3, fontFamily:SERIF, fontStyle:"italic", textAlign:"center" }}>{isEn?"Typical utilities: SFH $300 · TH $250 · Condo $150 · Co-op $0. Tax: check your bill.":"公用费典型：独立屋$300 · 联排$250 · 公寓$150 · Co-op$0 · 地税以税单为准"}</div>
              </>
            );
          })()}
        </div>

        {/* Bottom Generate Report CTA — prominent below main inputs */}
        <button
          onClick={() => setShowReport(true)}
          style={{
            width:"100%", padding:"9px 14px", marginBottom:6,
            background:C.arm, color:C.paper, border:"none", borderRadius:0,
            cursor:"pointer", fontFamily:FONT,
            display:"flex", alignItems:"center", justifyContent:"center", gap:8,
          }}
        >
          <span style={{ fontSize:13, fontFamily:SERIF, fontStyle:"italic", fontWeight:600, letterSpacing:-0.2 }}>{isEn?"Generate Report":"生成分析简报"}</span>
          <span style={{ fontSize:9, fontWeight:700, letterSpacing:2, textTransform:"uppercase", opacity:0.85 }}>→</span>
        </button>
        <div style={{ fontSize:8, color:C.textMuted, textAlign:"center", fontFamily:SERIF, fontStyle:"italic", marginBottom:6, lineHeight:1.4 }}>
          {isEn?`Full analysis · ${compareMode?"A/B/C comparison · ":""}closing cost breakdown · buy-down economics`:`完整分析 · ${compareMode?"A/B/C 对比 · ":""}过户费明细 · 买点回本`}
        </div>

        <GlossarySection terms={MORTGAGE_GLOSSARY} en={isEn} />
      </div>
      <BrandingFooter />
      {closingModalNode}
    </div>
  );
}


const POINTS_GLOSSARY = [
  { term:"Discount Points", cn:"买点/折扣点数", desc:"过户时预付的费用，用于换取更低利率。1点=贷款额的1%，通常可降低利率约0.25%。本质是\"预付利息\"。", descEn:"Upfront fee to buy a lower rate. 1 point = 1% of loan amount, typically reduces rate by ~0.25%." },
  { term:"APR", cn:"年化实际利率", desc:"将买点费用分摊到整个贷款期限后的等效年利率。APR越接近票面利率，说明前期费用越低。", descEn:"Effective annual rate after amortizing point costs. The closer APR is to note rate, the lower the upfront costs." },
  { term:"Break-Even", cn:"回本时间", desc:"买点的前期费用通过月供节省回收所需的时间。如果计划在回本前卖房或再融资，买点不划算。", descEn:"Time for monthly savings to recoup point costs. If you sell/refi before break-even, buying points is not worth it." },
  { term:"Note Rate", cn:"票面利率", desc:"贷款合同上的利率，用来计算月供。买了点后这个利率就是降低后的利率。", descEn:"The contract interest rate used to calculate your monthly payment. After buying points, this is the reduced rate." },
  { term:"Base Rate", cn:"基础利率(Par Rate)", desc:"不买任何点数时的原始利率。", descEn:"The original rate with zero discount points (par rate)." },
  { term:"Total Cost", cn:"总成本", desc:"累计利息 + 买点预付费用 + PMI（如适用）。用来对比不同方案的真实总花费。", descEn:"Cumulative interest + upfront point costs + PMI if applicable. The true total expense for comparing options." },
  { term:"PMI", cn:"私人抵押贷款保险", desc:"当首付<20%（LTV>80%）时，传统贷款要求缴纳的保险费，保护贷款机构。年费率0.19%-1.86%不等，取决于信用评分和LTV。月付金额=贷款额×PMI率÷12。根据HPA法案，当贷款余额降至原房价的78%时自动取消，80%时可申请取消。", descEn:"Private Mortgage Insurance. Required on conventional loans when down payment < 20% (LTV > 80%). Annual rate 0.19%-1.86% based on FICO and LTV. Monthly = loan × rate ÷ 12. Per HPA, auto-cancels at 78% LTV of original value; borrower can request cancel at 80% LTV." },
  { term:"LTV", cn:"贷款价值比", desc:"贷款余额÷房价的比例。80%以下无需PMI。LTV越低，月供风险越低，贷款条件越优。", descEn:"Loan-to-Value ratio = loan balance ÷ home value. No PMI needed below 80%. Lower LTV = better terms and no mortgage insurance required." },
];


function PointsAnalyzer({ onBack, lang: langProp }) {
  const { lang } = useSettings();
  const isEn = lang === "en";
  const [loanMode, setLoanMode] = React.useState("price");
  const [homePrice, setHomePrice] = React.useState(700000);
  const [downPct, setDownPct] = React.useState(20);
  const [directLoan, setDirectLoan] = React.useState(500000);
  const loanAmount = loanMode === "price" ? Math.round(homePrice * (1 - downPct / 100)) : directLoan;
  const [termYears, setTermYears] = React.useState(30);
  const [selectedMonth, setSelectedMonth] = React.useState(60);
  const [rateOptions, setRateOptions] = React.useState([
    { id: 1, rate: 7.000, points: 0 },
    { id: 2, rate: 6.750, points: 0.5 },
  ]);
  const [creditScore, setCreditScore] = React.useState("740");
  const [showReport, setShowReport] = React.useState(false);
  const [reportLang, setReportLang] = React.useState(lang);
  const [minWarn, setMinWarn] = React.useState(false);
  const nextId = React.useRef(10);
  const totalMonths = termYears * 12;

  // PMI Logic: only applies when LTV > 80% (price mode, downPct < 20)
  const initLTV = loanMode === "price" ? (loanAmount / homePrice) * 100 : 0;
  const pmiApplies = loanMode === "price" && initLTV > 80;
  // MGIC-style PMI rate table: [LTV bucket][credit bucket]
  const PMI_RATES = {
    "760":{"97":0.55,"95":0.41,"90":0.30,"85":0.19},
    "740":{"97":0.73,"95":0.58,"90":0.41,"85":0.27},
    "720":{"97":0.85,"95":0.70,"90":0.50,"85":0.35},
    "700":{"97":1.05,"95":0.85,"90":0.65,"85":0.45},
    "680":{"97":1.25,"95":1.05,"90":0.85,"85":0.60},
    "660":{"97":1.55,"95":1.35,"90":1.10,"85":0.80},
    "640":{"97":1.80,"95":1.55,"90":1.30,"85":1.00},
    "620":{"97":1.86,"95":1.65,"90":1.45,"85":1.15},
  };
  const ltvBucket = initLTV > 95 ? "97" : initLTV > 90 ? "95" : initLTV > 85 ? "90" : "85";
  const pmiRateAnnual = pmiApplies ? (PMI_RATES[creditScore]?.[ltvBucket] || 0.73) : 0;
  const pmiCancelBalance = loanMode === "price" ? homePrice * 0.78 : 0; // HPA auto-cancel at 78% LTV

  const removeOption = (id) => {
    if (rateOptions.length <= 2) { setMinWarn(true); setTimeout(() => setMinWarn(false), 2000); return; }
    setRateOptions(rateOptions.filter(o => o.id !== id));
  };
  const addOption = () => {
    if (rateOptions.length >= 7) return;
    const last = rateOptions[rateOptions.length - 1];
    nextId.current++;
    setRateOptions([...rateOptions, { id: nextId.current, rate: Math.max(Math.round((last.rate - 0.25) * 1000) / 1000, 2), points: Math.round((last.points + 0.5) * 1000) / 1000 }]);
  };
  const updateOption = (id, field, val) => setRateOptions(rateOptions.map(o => o.id === id ? { ...o, [field]: val } : o));

  const scenarios = React.useMemo(() => {
    const sorted = [...rateOptions].sort((a, b) => a.points - b.points);
    const base = sorted.find(o => o.points === 0) || sorted[0];
    const basePmt = pmtCalc(base.rate, totalMonths, loanAmount);
    return sorted.map((opt, idx) => {
      const cost = opt.points * 0.01 * loanAmount;
      const pmt = pmtCalc(opt.rate, totalMonths, loanAmount);
      const apr = calcAPR(opt.rate, loanAmount, cost, totalMonths);
      const monthlyPMI = pmiApplies ? (loanAmount * pmiRateAnnual / 100 / 12) : 0;
      const monthly = []; let bal = loanAmount, ti = 0, tpmi = 0, pmiOff = 0;
      for (let m = 1; m <= totalMonths; m++) {
        const ip = bal * (opt.rate / 100 / 12);
        bal = Math.max(0, bal - (pmt - ip));
        ti += ip;
        // PMI applies until scheduled balance drops to 78% of home price
        const pmiActive = pmiApplies && bal > pmiCancelBalance;
        if (pmiActive) { tpmi += monthlyPMI; }
        else if (pmiOff === 0 && pmiApplies) { pmiOff = m; }
        monthly.push({ totalInterest: ti, balance: bal, totalPMI: tpmi, pmiActive: pmiActive });
      }
      if (pmiApplies && pmiOff === 0) pmiOff = totalMonths; // never cancelled within term
      const save = basePmt - pmt;
      const beM = (save > 0 && cost > 0) ? Math.ceil(cost / save) : null;
      const isBase = opt.id === base.id;
      return {
        id: opt.id, points: opt.points, noteRate: opt.rate, pointCost: cost, payment: pmt, apr: apr,
        monthlyPMI: monthlyPMI, pmiOffMonth: pmiOff, pmiOffYears: pmiOff ? (pmiOff / 12).toFixed(1) : null,
        monthlySaving: save, breakEvenMonths: beM, breakEvenYears: beM ? (beM / 12).toFixed(1) : null,
        monthly: monthly, color: isBase ? C.danger : PT_COLORS[idx % PT_COLORS.length],
        label: isBase ? (fmtP(opt.rate) + " / 0" + (isEn ? "pt" : "\u70B9")) : (fmtP(opt.rate) + " / " + opt.points + (isEn ? "pt" : "\u70B9")),
      };
    });
  }, [rateOptions, loanAmount, termYears, isEn, pmiApplies, pmiRateAnnual, pmiCancelBalance]);

  const curMonth = Math.min(selectedMonth, totalMonths);
  const holdYrs = curMonth / 12;
  const holdLabel = holdYrs % 1 === 0 ? (holdYrs + (isEn ? "yr" : "\u5E74")) : (holdYrs.toFixed(1) + (isEn ? "yr" : "\u5E74"));

  const bestAtMonth = scenarios.reduce((best, s) => {
    const m = s.monthly[curMonth - 1];
    const tc = m.totalInterest + s.pointCost + (m.totalPMI || 0);
    return (!best || tc < best.tc) ? { ...s, tc: tc } : best;
  }, null);

  const trackRef = React.useRef(null);
  const handleScrub = React.useCallback(cx => {
    if (!trackRef.current) return;
    const r = trackRef.current.getBoundingClientRect();
    setSelectedMonth(Math.round(Math.max(0, Math.min(1, (cx - r.left) / r.width)) * (totalMonths - 1)) + 1);
  }, [totalMonths]);
  const onScrubDown = React.useCallback(e => {
    e.preventDefault(); handleScrub(e.clientX);
    const mv = ev => handleScrub(ev.clientX);
    const up = () => { window.removeEventListener("pointermove", mv); window.removeEventListener("pointerup", up); };
    window.addEventListener("pointermove", mv); window.addEventListener("pointerup", up);
  }, [handleScrub]);
  const scrubPct = ((curMonth - 1) / (totalMonths - 1)) * 100;

  /* REPORT */
  if (showReport) {
    const rIsEn = reportLang === "en";
    const bestPts = bestAtMonth ? bestAtMonth.points : 0;
    const bestS = scenarios.find(s => s.points === bestPts);
    const noS = scenarios.find(s => s.points === 0) || scenarios[0];
    const genText = () => {
      const L = [];
      L.push(rIsEn ? "DISCOUNT POINTS ANALYSIS" : "\u6298\u6263\u70B9\u6570\u5206\u6790");
      L.push("");
      L.push((rIsEn ? "Loan: " : "\u8D37\u6B3E\u989D\uFF1A") + fmtD(loanAmount) + " | " + (rIsEn ? "Term: " : "\u671F\u9650\uFF1A") + termYears + (rIsEn ? "yr" : "\u5E74") + " | " + (rIsEn ? "Hold: " : "\u6301\u6709\uFF1A") + holdLabel);
      if (pmiApplies) {
        L.push((rIsEn ? "PMI: " : "PMI: ") + pmiRateAnnual + "%/yr (LTV " + initLTV.toFixed(1) + "%, FICO " + creditScore + "+) = " + fmtD(Math.round(loanAmount*pmiRateAnnual/100/12)) + "/mo");
      }
      L.push("");
      scenarios.forEach(s => {
        const m = s.monthly[curMonth - 1];
        const tc = m.totalInterest + s.pointCost + (m.totalPMI || 0);
        const best = bestAtMonth && tc <= bestAtMonth.tc + 1;
        const be = s.breakEvenYears ? (s.breakEvenYears + (rIsEn ? "yr" : "\u5E74")) : "N/A";
        const pmiStr = pmiApplies ? (" | PMI off " + s.pmiOffYears + (rIsEn?"yr":"\u5E74") + " ($"+fmt(Math.round(m.totalPMI||0))+" paid)") : "";
        L.push((best ? "\u2605 " : "\u25BA ") + fmtP(s.noteRate) + " / " + s.points + (rIsEn ? "pt" : "\u70B9") + ": " + fmtD(s.payment) + "/mo | APR " + fmtP(s.apr) + " | B/E " + be + pmiStr + " | " + (rIsEn ? "Total " : "\u603B") + fmtD(tc) + (best ? (rIsEn ? " \u2190 BEST" : " \u2190 \u6700\u4F18") : ""));
      });
      L.push("");
      L.push(rIsEn ? "Disclaimer: For informational purposes only." : "\u58F0\u660E\uFF1A\u4EC5\u4F9B\u53C2\u8003\u3002");
      return L.join("\n");
    };
    const txt = genText();
    const handleSavePDF = () => { try { window.print(); } catch(e) {} };
    return (
      <div style={{ fontFamily: FONT, background: C.bg, minHeight: "100vh", color: C.ink, maxWidth: 480, margin: "0 auto" }}>
        <GlobalStyles />
        <style>{`@media print{body{background:white!important}.no-print{display:none!important}@page{margin:0.4in}.report-root{max-width:none!important;background:white!important}}`}</style>
        <div className="report-root" style={{ padding:"10px 14px 14px" }}>
          {/* ─── MASTHEAD ─── */}
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", paddingBottom:4, borderBottom:`0.5px solid ${C.ink}`, marginBottom:6 }}>
            <span style={{ fontSize:8, fontWeight:700, letterSpacing:2, textTransform:"uppercase" }}>Vol. I · JMJ</span>
            <span style={{ fontSize:8, fontStyle:"italic", fontFamily:SERIF, color:C.textSec }}>{rIsEn?"Discount Points · Brief":"折扣买点 · 简报"}</span>
            <div className="no-print" style={{ display:"flex", gap:4 }}>
              <button onClick={handleSavePDF} style={{ padding:"1px 8px", border:`0.5px solid ${C.ink}`, borderRadius:0, background:"transparent", color:C.ink, fontSize:8, fontWeight:700, fontFamily:FONT, cursor:"pointer", letterSpacing:1, textTransform:"uppercase" }}>{rIsEn?"PDF":"存PDF"}</button>
              <button onClick={()=>navigator.clipboard?.writeText(txt)} style={{ padding:"1px 8px", border:`0.5px solid ${C.ink}`, borderRadius:0, background:"transparent", color:C.ink, fontSize:8, fontWeight:700, fontFamily:FONT, cursor:"pointer", letterSpacing:1, textTransform:"uppercase" }}>{rIsEn?"Copy":"复制"}</button>
              <button onClick={()=>setShowReport(false)} style={{ padding:"1px 8px", border:`0.5px solid ${C.ink}`, borderRadius:0, background:"transparent", color:C.ink, fontSize:10, fontFamily:SERIF, cursor:"pointer" }}>✕</button>
            </div>
          </div>

          {/* ─── HEADLINE ─── */}
          <div style={{ textAlign:"center", borderBottom:`1.5px solid ${C.ink}`, paddingBottom:10, marginBottom:10 }}>
            <h1 style={{ fontSize:26, fontWeight:600, margin:0, letterSpacing:-0.6, fontFamily:SERIF, lineHeight:1 }}>
              {rIsEn?"Discount ":"折扣 "}<span style={{ fontStyle:"italic", fontWeight:500 }}>{rIsEn?"Points":"买点"}</span>
            </h1>
            <div style={{ fontSize:8, color:C.textDim, marginTop:3, letterSpacing:1.5, textTransform:"uppercase", fontWeight:600 }}>Rate Navigator · JMJ · {new Date().toLocaleDateString(rIsEn?"en-US":"zh-CN")}</div>
          </div>

          {/* ─── HERO: best option + key stats ─── */}
          {(() => {
            const bestM = bestS ? bestS.monthly[curMonth-1] : null;
            const noM = noS ? noS.monthly[curMonth-1] : null;
            const saving = (noM && bestM) ? ((noM.totalInterest + noS.pointCost + (noM.totalPMI||0)) - (bestM.totalInterest + bestS.pointCost + (bestM.totalPMI||0))) : 0;
            return (
              <div style={{ display:"flex", gap:12, borderBottom:`0.5px solid ${C.ink}`, paddingBottom:10, marginBottom:10 }}>
                <div style={{ flex:1.2, textAlign:"left", minWidth:0 }}>
                  <div style={{ fontSize:8, color:C.textSec, letterSpacing:2, textTransform:"uppercase", fontWeight:700 }}>
                    {bestPts === 0 ? (rIsEn?"No Points Wins":"不买点最优") : (rIsEn?"Best Option":"最优方案")}
                  </div>
                  <div style={{ fontSize:32, fontWeight:600, fontFamily:SERIF, color:C.arm, lineHeight:1, letterSpacing:-0.8, marginTop:2 }}>
                    {bestPts === 0 ? fmtP(bestS ? bestS.noteRate : 0) : `${bestPts}pt`}
                  </div>
                  <div style={{ fontSize:8, color:C.textDim, marginTop:4, fontFamily:SERIF, fontStyle:"italic", lineHeight:1.5 }}>
                    {bestS && `${fmtP(bestS.noteRate)} · ${fmtD(bestS.payment)}${rIsEn?"/mo":"/月"}`}<br/>
                    {rIsEn?"Hold ":"持有 "}{holdLabel} · {fmtD(loanAmount)} {rIsEn?"loan":"贷款"}
                  </div>
                </div>
                <div style={{ flex:1, display:"flex", flexDirection:"column", gap:4, borderLeft:`0.5px solid ${C.ink}`, paddingLeft:12, minWidth:0 }}>
                  {[
                    { l: rIsEn?"vs No Pts":"vs 不买点", v: (saving>0?"−":"+")+fmtD(Math.abs(Math.round(saving))), c: saving>0?C.arm:C.danger },
                    { l: rIsEn?"Point Cost":"买点费用", v: fmtD(bestS ? bestS.pointCost : 0), c:C.fixed },
                    { l: rIsEn?"Break-even":"回本时间", v: bestS?.breakEvenYears ? `${bestS.breakEvenYears}${rIsEn?"yr":"年"}` : "—", c:C.textSec },
                    { l: rIsEn?"APR":"APR", v: bestS ? fmtP(bestS.apr) : "—", c:C.textSec },
                  ].map((x,i) => (
                    <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", borderBottom:i<3?`0.5px dotted ${C.ink}`:"none", paddingBottom:3 }}>
                      <span style={{ fontSize:8, color:C.textSec, letterSpacing:1.2, textTransform:"uppercase", fontWeight:600 }}>{x.l}</span>
                      <span style={{ fontSize:11, fontWeight:600, fontFamily:SERIF, color:x.c, letterSpacing:-0.2 }}>{x.v}</span>
                    </div>
                  ))}
                </div>
              </div>
            );
          })()}

          {/* ─── Scenarios comparison table ─── */}
          <div style={{ borderBottom:`0.5px solid ${C.ink}`, paddingBottom:10, marginBottom:10 }}>
            <div style={{ fontSize:8, fontWeight:700, letterSpacing:2, textTransform:"uppercase", borderBottom:`0.5px solid ${C.ink}`, paddingBottom:2, marginBottom:4 }}>{rIsEn?"Options · at ":"方案对比 · 持有"}{holdLabel}</div>
            <div style={{ display:"flex", fontSize:9, color:C.textSec, fontWeight:600, padding:"2px 0", borderBottom:`0.5px dotted ${C.ink}` }}>
              <div style={{ flex:0.9 }}>{rIsEn?"Option":"方案"}</div>
              <div style={{ flex:0.8, textAlign:"right" }}>{rIsEn?"Pmt":"月供"}</div>
              <div style={{ flex:0.7, textAlign:"right" }}>APR</div>
              <div style={{ flex:0.7, textAlign:"right" }}>{rIsEn?"Cost":"费用"}</div>
              <div style={{ flex:0.7, textAlign:"right" }}>{rIsEn?"B/E":"回本"}</div>
              <div style={{ flex:0.9, textAlign:"right" }}>{rIsEn?"Total":"总成本"}</div>
            </div>
            {scenarios.map((s, i) => {
              const m = s.monthly[curMonth-1];
              const tc = m.totalInterest + s.pointCost + (m.totalPMI||0);
              const isBest = bestAtMonth && tc <= bestAtMonth.tc + 1;
              return (
                <div key={s.id} style={{ display:"flex", fontSize:10, padding:"3px 0", borderBottom:i<scenarios.length-1?`0.5px dotted ${C.ink}`:"none", background:isBest?C.armLight:"transparent" }}>
                  <div style={{ flex:0.9, color:s.color, fontWeight:700, fontFamily:MONO, fontSize:9 }}>{isBest ? "★ " : ""}{fmtP(s.noteRate)}/{s.points}pt</div>
                  <div style={{ flex:0.8, textAlign:"right", fontFamily:SERIF, color:C.ink, fontWeight:600 }}>{fmtD(s.payment)}</div>
                  <div style={{ flex:0.7, textAlign:"right", fontFamily:MONO, color:C.textSec, fontSize:9 }}>{fmtP(s.apr)}</div>
                  <div style={{ flex:0.7, textAlign:"right", fontFamily:MONO, color:C.textSec, fontSize:9 }}>{s.pointCost>0?fmtD(s.pointCost):"—"}</div>
                  <div style={{ flex:0.7, textAlign:"right", fontFamily:MONO, color:s.breakEvenMonths && curMonth>=s.breakEvenMonths ? C.arm : C.textMuted, fontSize:9 }}>{!s.breakEvenMonths?"—":s.breakEvenYears+(rIsEn?"y":"年")}</div>
                  <div style={{ flex:0.9, textAlign:"right", fontFamily:SERIF, fontWeight:600, color:isBest?C.arm:C.ink, fontSize:11, letterSpacing:-0.2 }}>{fmtD(tc)}</div>
                </div>
              );
            })}
          </div>

          {/* ─── Holding period sensitivity: how each option changes with hold duration ─── */}
          <div style={{ borderBottom:`0.5px solid ${C.ink}`, paddingBottom:10, marginBottom:10 }}>
            <div style={{ fontSize:8, fontWeight:700, letterSpacing:2, textTransform:"uppercase", borderBottom:`0.5px solid ${C.ink}`, paddingBottom:2, marginBottom:4 }}>{rIsEn?"Hold Duration Sensitivity":"持有期敏感度"}</div>
            <div style={{ display:"flex", fontSize:9, color:C.textSec, fontWeight:600, padding:"2px 0", borderBottom:`0.5px dotted ${C.ink}` }}>
              <div style={{ flex:1 }}>{rIsEn?"Hold":"持有"}</div>
              {scenarios.slice(0, 4).map(s => <div key={s.id} style={{ flex:1, textAlign:"right", color:s.color, fontFamily:MONO, fontSize:8 }}>{s.points}pt</div>)}
              <div style={{ flex:1, textAlign:"right", color:C.ink, fontWeight:700, fontSize:8 }}>{rIsEn?"Winner":"最优"}</div>
            </div>
            {[3, 5, 7, 10, 15].filter(y => y * 12 <= totalMonths).map((years, i, arr) => {
              const m = years * 12;
              const costs = scenarios.slice(0, 4).map(s => {
                const mm = s.monthly[m-1];
                return { s, tc: mm.totalInterest + s.pointCost + (mm.totalPMI || 0) };
              });
              const winner = costs.reduce((b, c) => c.tc < b.tc ? c : b, costs[0]);
              return (
                <div key={years} style={{ display:"flex", fontSize:10, padding:"2px 0", borderBottom:i<arr.length-1?`0.5px dotted ${C.ink}`:"none" }}>
                  <div style={{ flex:1, color:C.textSec, fontSize:9 }}>{years}{rIsEn?"yr":"年"}</div>
                  {costs.map(c => (
                    <div key={c.s.id} style={{ flex:1, textAlign:"right", fontFamily:MONO, color:c === winner ? C.arm : C.textMuted, fontWeight:c === winner ? 700 : 500, fontSize:9 }}>{fmtD(Math.round(c.tc))}</div>
                  ))}
                  <div style={{ flex:1, textAlign:"right", fontFamily:SERIF, color:winner.s.color, fontWeight:700, fontSize:10 }}>{winner.s.points}pt</div>
                </div>
              );
            })}
          </div>

          {/* ─── Key metrics + PMI notes ─── */}
          <div style={{ display:"flex", gap:14, borderBottom:`0.5px solid ${C.ink}`, paddingBottom:10, marginBottom:10 }}>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontSize:8, fontWeight:700, letterSpacing:2, textTransform:"uppercase", borderBottom:`0.5px solid ${C.ink}`, paddingBottom:2, marginBottom:4 }}>{rIsEn?"Key Metrics":"关键指标"}</div>
              {[
                { l: rIsEn?"Loan":"贷款", v: fmtD(loanAmount) },
                { l: rIsEn?"Term":"期限", v: `${termYears}${rIsEn?"yr":"年"}` },
                { l: rIsEn?"Options":"方案数", v: `${scenarios.length}` },
                { l: rIsEn?"Rate / Point":"每点降息", v: `${RATE_PER_POINT}%` },
              ].map((x,i,arr) => (
                <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", padding:"2px 0", fontSize:9, borderBottom:i<arr.length-1?`0.5px dotted ${C.ink}`:"none" }}>
                  <span style={{ color:C.textSec }}>{x.l}</span>
                  <span style={{ fontFamily:MONO, color:C.ink, fontWeight:600 }}>{x.v}</span>
                </div>
              ))}
            </div>
            {pmiApplies ? (
              <div style={{ flex:1, minWidth:0, borderLeft:`0.5px solid ${C.ink}`, paddingLeft:14 }}>
                <div style={{ fontSize:8, fontWeight:700, letterSpacing:2, textTransform:"uppercase", borderBottom:`0.5px solid ${C.ink}`, paddingBottom:2, marginBottom:4 }}>{rIsEn?"PMI":"PMI"}</div>
                {[
                  { l: rIsEn?"LTV":"LTV", v: initLTV.toFixed(1)+"%" },
                  { l: rIsEn?"FICO":"信用", v: `${creditScore}+` },
                  { l: rIsEn?"Rate":"费率", v: `${pmiRateAnnual}%/yr` },
                  { l: rIsEn?"Monthly":"每月", v: fmtD(Math.round(loanAmount*pmiRateAnnual/100/12)) },
                ].map((x,i,arr) => (
                  <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", padding:"2px 0", fontSize:9, borderBottom:i<arr.length-1?`0.5px dotted ${C.ink}`:"none" }}>
                    <span style={{ color:C.textSec }}>{x.l}</span>
                    <span style={{ fontFamily:MONO, color:x.l.includes("Rate")||x.l.includes("费率")?C.warn:C.ink, fontWeight:600 }}>{x.v}</span>
                  </div>
                ))}
              </div>
            ) : (
              <div style={{ flex:1, minWidth:0, borderLeft:`0.5px solid ${C.ink}`, paddingLeft:14 }}>
                <div style={{ fontSize:8, fontWeight:700, letterSpacing:2, textTransform:"uppercase", borderBottom:`0.5px solid ${C.ink}`, paddingBottom:2, marginBottom:4 }}>{rIsEn?"Point Economics":"买点经济"}</div>
                <div style={{ fontSize:9, color:C.textSec, lineHeight:1.5, fontStyle:"italic", fontFamily:SERIF, padding:"4px 0" }}>
                  {rIsEn
                    ? `Each point (1% of loan) typically reduces rate by ${RATE_PER_POINT}%. Break-even depends on how long you hold — sell/refi early, points lose money.`
                    : `每点（贷款1%）通常降息${RATE_PER_POINT}%。回本与持有时长挂钩 —— 如果提前出售或再融资，买点反而亏。`}
                </div>
              </div>
            )}
          </div>

          {/* ─── Recommendation ─── */}
          <div style={{ borderBottom:`0.5px solid ${C.ink}`, paddingBottom:10, marginBottom:10 }}>
            <div style={{ fontSize:8, fontWeight:700, letterSpacing:2, textTransform:"uppercase", borderBottom:`0.5px solid ${C.ink}`, paddingBottom:2, marginBottom:4 }}>{rIsEn?"Recommendation":"建议"}</div>
            <div style={{ fontSize:10, color:C.textSec, lineHeight:1.6, fontFamily:SERIF, fontStyle:"italic", padding:"4px 0" }}>
              {bestPts === 0
                ? (rIsEn
                  ? `At a ${holdLabel} hold, no-points wins. Points don't pay off within your horizon — keep the cash.`
                  : `持有 ${holdLabel} 情况下，不买点最划算。买点回本期超出您的持有计划，现金保留更合理。`)
                : (bestS?.breakEvenYears && holdYrs >= Number(bestS.breakEvenYears)
                  ? (rIsEn
                    ? `${bestPts}pt is the sweet spot — break-even at ${bestS.breakEvenYears}yr, and you're holding past that. Every month beyond break-even is savings.`
                    : `${bestPts} 点是最甜区——回本期 ${bestS.breakEvenYears} 年，您的持有期已超过。超出的每个月都是净省。`)

                    ? `${bestPts}pt shows lower total cost at ${holdLabel}, but break-even is ${bestS?.breakEvenYears||"—"}yr. Confirm your hold window before committing cash upfront.`
                    : `${bestPts} 点在持有 ${holdLabel} 下总成本最低，但回本期 ${bestS?.breakEvenYears||"—"} 年。买点前请确认持有期足够。`))}
            </div>
          </div>

          {/* ─── FOOTER ─── */}
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", fontSize:7, color:C.textMuted, letterSpacing:1, textTransform:"uppercase", paddingTop:4 }}>

          </div>
        </div>
      </div>
    );
  }

  /* MAIN VIEW */
  return (

                  style={{ minWidth:0, flex:0.9, padding:"2px 3px", borderRadius: 0, border:`0.5px solid ${C.ink}`, fontSize:10, fontFamily:MONO, fontWeight:700, color:C.text, outline:"none", background:C.white, textAlign:"center" }} />
