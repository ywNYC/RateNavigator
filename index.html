/* 
   SHARED: helpers, palette, components
    */
const fmt = (n) => n.toLocaleString("en-US", { maximumFractionDigits: 0 });
const fmtD = (n) => "$" + fmt(Math.round(n));
const fmtP = (n) => n.toFixed(3) + "%";

function pmtCalc(annualRate, totalMonths, principal) {
  if (annualRate === 0) return principal / totalMonths;
  const r = annualRate / 100 / 12;
  return (principal * r * Math.pow(1 + r, totalMonths)) / (Math.pow(1 + r, totalMonths) - 1);
}

function calcAPR(noteRate, loanAmount, pointCost, totalMonths) {
  if (pointCost <= 0) return noteRate;
  const payment = pmtCalc(noteRate, totalMonths, loanAmount);
  const netProceeds = loanAmount - pointCost;
  let lo = noteRate * 0.5, hi = noteRate * 3;
  for (let i = 0; i < 80; i++) {
    const mid = (lo + hi) / 2;
    const r = mid / 100 / 12;
    const pv = r === 0 ? payment * totalMonths : payment * (1 - Math.pow(1 + r, -totalMonths)) / r;
    if (pv > netProceeds) lo = mid; else hi = mid;
  }
  return Math.round(((lo + hi) / 2) * 1000) / 1000;
}

const RATE_PER_POINT = 0.25;

/* Three background themes. Only BG / PAPER / HAIRLINE / TEXT vary.
   Accent colors (arm/fixed/warn/danger/purple) stay the same across themes. */
const THEMES = {
  newsprint: {
    label: "Newsprint", labelCn: "米黄",
    swatch: "#ECE3D0",
    bg: "#ECE3D0", card: "#F4ECD8", cardAlt: "#E4DBC6", paper: "#F4ECD8",
    borderLight: "#B8A98C",
    text: "#1A1611", textSec: "#4A3D2D", textDim: "#7A6B52", textMuted: "#9A8B72",
    ink: "#1A1611",
    grain: "rgba(26,22,17,0.025)",
  },
  paperwhite: {
    label: "Paperwhite", labelCn: "纸白",
    swatch: "#F5F1E8",
    bg: "#F5F1E8", card: "#FBF8EF", cardAlt: "#EEE9DB", paper: "#FBF8EF",
    borderLight: "#C9BFAE",
    text: "#1F1A14", textSec: "#524736", textDim: "#8A7D66", textMuted: "#A89C85",
    ink: "#1F1A14",
    grain: "rgba(31,26,20,0.02)",
  },
  mist: {
    label: "Mist", labelCn: "雾灰",
    swatch: "#E4E6E2",
    bg: "#E4E6E2", card: "#EFF0EC", cardAlt: "#D6D9D3", paper: "#EFF0EC",
    borderLight: "#A8ACA4",
    text: "#171A17", textSec: "#3D423D", textDim: "#6C716C", textMuted: "#8E938E",
    ink: "#171A17",
    grain: "rgba(23,26,23,0.03)",
  },
};

/* Bloomberg x Monocle — muted accounting palette on cream newsprint.
   Backgrounds and text colors read from CSS vars so the theme-switcher can flip them. */
const C = {
  bg: "var(--bg)",
  card: "var(--card)",
  cardAlt: "var(--cardAlt)",
  border: "var(--ink)",          /* near-black hairline ink */
  borderLight: "var(--borderLight)",
  arm: "#2F5D3C",         /* 墨绿 ink green - savings */
  armLight: "#D8DCC1",
  armGlow: "rgba(47,93,60,0.10)",
  fixed: "#2F4A5C",       /* slate ink */
  fixedLight: "#CFD3D9",
  warn: "#9B7A3A",        /* 威士忌金 whiskey gold */
  warnLight: "#E6D9B8",
  danger: "#8B3A2B",      /* 铁锈红 rust red */
  dangerLight: "#DECBC1",
  purple: "#5C4775",
  purpleLight: "#D6CEDC",
  text: "var(--text)",
  textSec: "var(--textSec)",
  textDim: "var(--textDim)",
  textMuted: "var(--textMuted)",
  white: "var(--paper)",
  paper: "var(--paper)",
  ink: "var(--ink)",
  shadow: "none",
  shadowHover: "none",
};

/* Apply theme by writing CSS vars onto document root. Persist to localStorage. */
function applyTheme(themeKey) {
  const t = THEMES[themeKey] || THEMES.newsprint;
  const r = document.documentElement;
  r.style.setProperty("--bg", t.bg);
  r.style.setProperty("--card", t.card);
  r.style.setProperty("--cardAlt", t.cardAlt);
  r.style.setProperty("--paper", t.paper);
  r.style.setProperty("--borderLight", t.borderLight);
  r.style.setProperty("--text", t.text);
  r.style.setProperty("--textSec", t.textSec);
  r.style.setProperty("--textDim", t.textDim);
  r.style.setProperty("--textMuted", t.textMuted);
  r.style.setProperty("--ink", t.ink);
  r.style.setProperty("--grain", t.grain);
  document.body.style.background = t.bg;
  try { localStorage.setItem("rn_theme", themeKey); } catch (e) {}
}

function getStoredTheme() {
  try { return localStorage.getItem("rn_theme") || "paperwhite"; } catch (e) { return "paperwhite"; }
}

/* Global settings context — theme + lang accessible from any component without prop drilling */
const SettingsContext = React.createContext({ theme: "paperwhite", setTheme: () => {}, lang: "cn", setLang: () => {} });
const useSettings = () => React.useContext(SettingsContext);

/* Theme switcher button row — larger swatches, used in masthead of every page */
function ThemeSwitcher({ theme, onChange, size = 20 }) {
  return (
    <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
      {Object.entries(THEMES).map(([k, t]) => {
        const active = k === theme;
        return (
          <button key={k} onClick={() => onChange(k)} title={t.label} aria-label={t.label}
            style={{
              width: size, height: size, padding: 0, borderRadius: 0, cursor: "pointer",
              background: t.swatch,
              border: `${active ? 1.5 : 0.5}px solid var(--ink)`,
              boxShadow: "none",
              position: "relative",
            }}>
            {active && <span style={{ position:"absolute", inset:0, display:"flex", alignItems:"center", justifyContent:"center", fontSize: size>=18?10:8, color:"var(--ink)", fontWeight:700, fontFamily:"'Fraunces',serif" }}>✓</span>}
          </button>
        );
      })}
    </div>
  );
}

/* Language switcher — larger tap targets, used in masthead of every page */
function LangSwitcher({ lang, onChange }) {
  return (
    <div style={{ display: "flex", gap: 0, border: "0.5px solid var(--ink)" }}>
      {[{ k: "cn", l: "中" }, { k: "en", l: "EN" }].map(t => {
        const a = t.k === lang;
        return <button key={t.k} onClick={() => onChange(t.k)}
          style={{ padding: "3px 10px", border: "none", cursor: "pointer",
                   background: a ? "var(--ink)" : "var(--paper)",
                   color: a ? "var(--paper)" : "var(--ink)",
                   fontSize: 10, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase",
                   fontFamily: "'Noto Sans SC','Fraunces',Georgia,sans-serif", minWidth: 32 }}>{t.l}</button>;
      })}
    </div>
  );
}

/* Shared masthead bar — appears in every tool page (upper-left theme, upper-right lang).
   Two modes:
   - inline (default): renders as a flex row you place yourself
   - floating: positions itself absolutely at top of screen over content */
function GlobalBar({ compact = false, floating = false }) {
  const { theme, setTheme, lang, setLang } = useSettings();
  const wrapStyle = floating ? {
    position: "fixed", top: 6, left: "50%", transform: "translateX(-50%)",
    width: "100%", maxWidth: 480, padding: "0 10px",
    zIndex: 150, pointerEvents: "none",
    display: "flex", justifyContent: "space-between", alignItems: "center",
  } : { display: "flex", justifyContent: "space-between", alignItems: "center", gap: 8, padding: compact ? "3px 0" : "4px 0" };
  const innerStyle = floating ? { pointerEvents: "auto" } : null;
  return (
    <div style={wrapStyle}>
      <div style={innerStyle || undefined}><ThemeSwitcher theme={theme} onChange={setTheme} size={compact ? 16 : 18} /></div>
      <div style={innerStyle || undefined}><LangSwitcher lang={lang} onChange={setLang} /></div>
    </div>
  );
}

const FONT = `'Noto Sans SC','Fraunces',Georgia,-apple-system,sans-serif`;
const SERIF = `'Fraunces',Georgia,'Noto Serif SC',serif`;
const MONO = `'JetBrains Mono','SF Mono',ui-monospace,monospace`;

function LogoSVG({ size = 32 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 40 40" fill="none">
      <rect x="0.5" y="0.5" width="39" height="39" fill={C.paper} stroke={C.ink} strokeWidth="1" />
      <text x="20" y="17" textAnchor="middle" fill={C.ink} fontSize="9" fontFamily="Fraunces, Georgia, serif" fontWeight="700" fontStyle="italic" letterSpacing="0.5">Rate</text>
      <line x1="6" y1="20" x2="34" y2="20" stroke={C.ink} strokeWidth="0.5" />
      <text x="20" y="31" textAnchor="middle" fill={C.ink} fontSize="9" fontFamily="Fraunces, Georgia, serif" fontWeight="700" letterSpacing="0.5">NAV</text>
    </svg>
  );
}

function RateInput({ label, labelEn, value, onChange, min, max, step, color }) {
  const pct = ((value - min) / (max - min)) * 100;
  const [editing, setEditing] = React.useState(false);
  const [draft, setDraft] = React.useState("");
  const startEdit = () => { setDraft(value.toFixed(3)); setEditing(true); };
  const commitEdit = () => {
    const v = parseFloat(draft);
    if (!isNaN(v) && v >= min && v <= max) onChange(Math.round(v * 1000) / 1000);
    setEditing(false);
  };
  const accent = color || C.arm;
  return (
    <div style={{ marginBottom: 10 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4, borderBottom: `0.5px solid ${C.ink}`, paddingBottom: 2 }}>
        <div>
          <span style={{ fontSize: 9, color: C.textSec, fontWeight: 700, letterSpacing: 1.2, textTransform: "uppercase" }}>{label}</span>
        </div>
        {editing ? (
          <div style={{ display: "flex", alignItems: "baseline", gap: 2 }}>
            <input autoFocus type="number" value={draft} onChange={e => setDraft(e.target.value)}
              onBlur={commitEdit} onKeyDown={e => e.key === "Enter" && commitEdit()}
              style={{ width: 56, fontSize: 14, fontWeight: 600, fontFamily: SERIF, color: accent,
                border: "none", borderBottom: `1px solid ${accent}`, borderRadius: 0, padding: "1px 4px",
                background: "transparent", outline: "none", textAlign: "right" }} />
            <span style={{ fontSize: 11, color: accent, fontWeight: 600, fontFamily: SERIF }}>%</span>
          </div>
        ) : (
          <span onClick={startEdit} style={{
            fontSize: 15, color: accent, fontWeight: 600, fontFamily: SERIF, cursor: "pointer",
            padding: 0, fontVariantNumeric: "tabular-nums", letterSpacing: -0.2,
          }}>{value.toFixed(3)}<span style={{ fontSize: 10, marginLeft: 2 }}>%</span></span>
        )}
      </div>
      <input type="range" min={min} max={max} step={step} value={value}
        onChange={e => onChange(Math.round(Number(e.target.value) * 1000) / 1000)}
        style={{ width: "100%", height: 2, borderRadius: 0, outline: "none",
          appearance: "none", WebkitAppearance: "none", cursor: "pointer",
          background: `linear-gradient(to right, ${accent} 0%, ${accent} ${pct}%, ${C.borderLight} ${pct}%, ${C.borderLight} 100%)`,
        }} />
    </div>
  );
}

function AmountSlider({ label, labelEn, value, onChange, min, max, step, color }) {
  const pct = ((value - min) / (max - min)) * 100;
  const [editing, setEditing] = React.useState(false);
  const [draft, setDraft] = React.useState("");
  const startEdit = () => { setDraft(String(value)); setEditing(true); };
  const commitEdit = () => {
    const v = parseInt(draft.replace(/[^0-9]/g, ""), 10);
    if (!isNaN(v) && v >= min && v <= max) onChange(v);
    setEditing(false);
  };
  const accent = color || C.arm;
  return (
    <div style={{ marginBottom: 10 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4, borderBottom: `0.5px solid ${C.ink}`, paddingBottom: 2 }}>
        <div>
          <span style={{ fontSize: 9, color: C.textSec, fontWeight: 700, letterSpacing: 1.2, textTransform: "uppercase" }}>{label}</span>
        </div>
        {editing ? (
          <input autoFocus type="text" value={draft} onChange={e => setDraft(e.target.value)}
            onBlur={commitEdit} onKeyDown={e => e.key === "Enter" && commitEdit()}
            style={{ width: 100, fontSize: 14, fontWeight: 600, fontFamily: SERIF, color: accent,
              border: "none", borderBottom: `1px solid ${accent}`, borderRadius: 0, padding: "1px 4px",
              background: "transparent", outline: "none", textAlign: "right" }} />
        ) : (
          <span onClick={startEdit} style={{
            fontSize: 15, color: accent, fontWeight: 600, fontFamily: SERIF, cursor: "pointer",
            padding: 0, fontVariantNumeric: "tabular-nums", letterSpacing: -0.2,
          }}>{fmtD(value)}</span>
        )}
      </div>
      <input type="range" min={min} max={max} step={step} value={value}
        onChange={e => onChange(Number(e.target.value))}
        style={{ width: "100%", height: 2, borderRadius: 0, outline: "none",
          appearance: "none", WebkitAppearance: "none", cursor: "pointer",
          background: `linear-gradient(to right, ${accent} 0%, ${accent} ${pct}%, ${C.borderLight} ${pct}%, ${C.borderLight} 100%)`,
        }} />
    </div>
  );
}

function StatCard({ label, labelEn, value, sub, color, highlight }) {
  return (
    <div style={{
      background: highlight || C.paper, padding: "6px 10px",
      border: `0.5px solid ${C.ink}`, flex: 1, minWidth: 0,
    }}>
      <div style={{ fontSize: 8, color: C.textSec, fontWeight: 700, lineHeight: 1.3, letterSpacing: 1, textTransform: "uppercase" }}>{label}</div>
      {labelEn && <div style={{ fontSize: 7, color: C.textMuted, marginBottom: 1, fontStyle: "italic", fontFamily: SERIF }}>{labelEn}</div>}
      <div style={{ fontSize: 16, fontWeight: 600, color: color || C.ink, fontFamily: SERIF, lineHeight: 1.1, marginTop: 2, fontVariantNumeric: "tabular-nums", letterSpacing: -0.3 }}>{value}</div>
      {sub && <div style={{ fontSize: 8, color: C.textDim, marginTop: 2, lineHeight: 1.3, fontStyle: "italic", fontFamily: SERIF }}>{sub}</div>}
    </div>
  );
}

function GlossaryItem({ term, cn, desc, descEn, en: isEn }) {
  const [open, setOpen] = React.useState(false);
  return (
    <div style={{ borderBottom: `0.5px solid ${C.ink}`, paddingBottom: open ? 6 : 0, marginBottom: 1 }}>
      <button onClick={() => setOpen(!open)} style={{
        width: "100%", padding: "6px 0", border: "none", background: "none",
        cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "baseline", fontFamily: FONT,
      }}>
        <div style={{ textAlign: "left" }}>
          <span style={{ fontSize: 11, fontWeight: 600, color: C.ink, fontFamily: SERIF, fontStyle: "italic" }}>{term}</span>
          {!isEn && <span style={{ fontSize: 10, color: C.textSec, fontWeight: 500, marginLeft: 8 }}>{cn}</span>}
        </div>
        <span style={{ fontSize: 11, color: C.textDim, fontFamily: SERIF, fontStyle: "italic" }}>{open ? "—" : "+"}</span>
      </button>
      {open && <div style={{ fontSize: 10, color: C.textSec, lineHeight: 1.5, padding: "0 0 3px", animation: "fadeIn .2s ease-out" }}>{isEn && descEn ? descEn : desc}</div>}
    </div>
  );
}

function GlossarySection({ terms, en: isEn }) {
  const [sectionOpen, setSectionOpen] = React.useState(false);
  return (
    <div style={{ background: C.paper, border: `0.5px solid ${C.ink}`, padding: sectionOpen ? "16px 18px 8px" : "0 18px" }}>
      <button onClick={() => setSectionOpen(!sectionOpen)} style={{
        width: "100%", padding: "12px 0", border: "none", background: "none",
        cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "baseline", fontFamily: FONT,
        borderBottom: sectionOpen ? `1px solid ${C.ink}` : "none",
        marginBottom: sectionOpen ? 10 : 0,
      }}>
        <span style={{ fontSize: 10, fontWeight: 700, color: C.ink, letterSpacing: 2, textTransform: "uppercase" }}>{isEn ? "Glossary" : "术语释义 · Glossary"}</span>
        <span style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
          <span style={{ fontSize: 9, color: C.textDim, fontStyle: "italic", fontFamily: SERIF }}>{sectionOpen ? (isEn ? `${terms.length} terms` : `${terms.length} 个术语`) : (isEn ? "tap to open" : "点击打开")}</span>
          <span style={{ fontSize: 13, color: C.textDim, fontFamily: SERIF, fontStyle: "italic" }}>{sectionOpen ? "—" : "+"}</span>
        </span>
      </button>
      {sectionOpen && (
        <>
          {terms.map((t, i) => <GlossaryItem key={i} {...t} en={isEn} />)}
          <div style={{ textAlign: "center", padding: "10px 0 2px", fontSize: 8, color: C.textMuted, letterSpacing: 1.5, textTransform: "uppercase" }}>© JMJ · Rate Navigator</div>
        </>
      )}
    </div>
  );
}

function BrandingFooter() {
  return (
    <div style={{ padding: "24px 16px 12px", textAlign: "center", borderTop: `0.5px solid ${C.ink}`, marginTop: 8 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8, marginBottom: 8 }}>
        <LogoSVG size={22} />
        <span style={{ fontSize: 10, fontWeight: 700, color: C.ink, letterSpacing: 2.5, textTransform: "uppercase" }}>Rate Navigator</span>
      </div>
      <div style={{ fontSize: 9, color: C.textDim, lineHeight: 1.6, letterSpacing: 1, fontFamily: SERIF, fontStyle: "italic" }}>Product by JMJ · All rights reserved</div>
      <div style={{ fontSize: 8, color: C.textMuted, marginTop: 4, lineHeight: 1.5, letterSpacing: 0.5 }}>
        For informational purposes only · Not financial advice
      </div>
    </div>
  );
}

  return (
    <style>{`
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500;1,9..144,600&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

      input[type=number]{-moz-appearance:textfield}
      *{box-sizing:border-box;margin:0;padding:0}
      body{background:var(--bg);color:var(--ink);transition:background .25s ease-out}
      @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

function buildArmMonthly(principal, armQuoteRate, armPoints, fixedPeriod, scenario, periodicCap, lifetimeCap, termYears, seed) {
  const initRate = armQuoteRate;
  let s = seed;
  const rand = () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
  const noise = () => (rand() - 0.5) * 0.03;
  const schedule = []; let balance = principal, currentRate = initRate, totalInterest = 0;
  const totalMonths = termYears * 12, fixedMonths = fixedPeriod * 12;
  for (let m = 1; m <= totalMonths; m++) {
    if (m > fixedMonths && (m - fixedMonths - 1) % 12 === 0) {
      const adjY = Math.floor((m - fixedMonths - 1) / 12), totalAdj = termYears - fixedPeriod, prog = adjY / totalAdj;
      let d = 0;
      switch (scenario) {
        case "sharp_rise": d = 0.35 + rand()*0.15+noise(); break;
        case "mod_rise": d = 0.12+rand()*0.08+noise(); break;
        case "rise_flat": d = adjY<totalAdj*0.4?(0.25+rand()*0.12+noise()):(noise()*1.5); break;
        case "flat": d = (rand()-0.5)*0.06+noise(); break;
        case "v_shape": d = prog<0.45?-(0.18+rand()*0.08+noise()):(0.22+rand()*0.10+noise()); break;
        case "inv_v": d = prog<0.45?(0.22+rand()*0.10+noise()):-(0.18+rand()*0.08+noise()); break;
        case "mod_fall": d = -(0.10+rand()*0.08)+noise(); break;
        case "sharp_fall": d = -(0.28+rand()*0.12)+noise(); break;
        default: d = noise();
      }
      let nr = Math.round((currentRate+d)*100)/100;
      if(nr-currentRate>periodicCap) nr=currentRate+periodicCap;
      if(currentRate-nr>periodicCap) nr=currentRate-periodicCap;
      nr = Math.min(Math.max(nr, initRate), initRate+lifetimeCap);
      currentRate = Math.round(nr*100)/100;
    }
    const rm = totalMonths-m+1, mp = pmtCalc(currentRate,rm,balance);
    const ip = balance*(currentRate/100/12), pp = mp-ip;
    balance = Math.max(0,balance-pp); totalInterest += ip;
    schedule.push({ month:m, rate:currentRate, payment:mp, balance, totalInterest });
  }
  return schedule;
}

function buildFixedMonthly(principal, rate, termYears) {
  const mp = pmtCalc(rate, termYears*12, principal);
  const sch = []; let bal = principal, ti = 0;
  for (let m = 1; m <= termYears*12; m++) {
    const ip = bal*(rate/100/12); bal = Math.max(0,bal-(mp-ip)); ti += ip;
    sch.push({ month:m, rate, payment:mp, balance:bal, totalInterest:ti });
  }
  return sch;
}

  const chartData=React.useMemo(()=>{const d=[];for(let m=1;m<=totalMonths;m+=3){const a=armSch[m-1],f=fixSch[m-1];if(!a||!f)continue;d.push({month:m,"ARM利率":+a.rate.toFixed(3),"固定利率":+f.rate.toFixed(3),"ARM月供":Math.round(a.payment),"固定月供":Math.round(f.payment),"ARM累计利息":Math.round(a.totalInterest),"固定累计利息":Math.round(f.totalInterest)});}return d;},[armSch,fixSch]);

        </div>

        </button>

      {showInputs&&(
        <div style={{ margin:"6px 12px 0", padding:"10px 12px", background:C.card, border:`0.5px solid ${C.ink}`, borderRadius: 0, animation:"cardIn .35s ease-out" }}>

          <div style={{ display:"flex", gap:4, marginBottom:8, background:"transparent", borderBottom:`0.5px solid ${C.ink}`, padding:0 }}>
            {[{k:"price",l:isEn?"By Home Price":"通过房价"},{k:"direct",l:isEn?"Direct Input":"直接输入"}].map(t => {
              const a = t.k === loanMode;
              return <button key={t.k} onClick={() => setLoanMode(t.k)} style={{ flex:1, padding:"4px 2px", borderRadius: 0, border:"none", cursor:"pointer", background:a?C.ink:"transparent", fontFamily:FONT, fontSize:10, fontWeight:a ? 700 : 500, color:a?C.paper:C.textSec }}>{t.l}</button>;
            })}
          </div>
          {loanMode === "price" ? <>
            <AmountSlider label={isEn?"Home Price":"房价"} value={homePrice} onChange={setHomePrice} min={200000} max={3000000} step={25000} color={C.arm} />
            <div style={{ marginBottom:8 }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:3 }}>
                <span style={{ fontSize:10, color:C.textSec, fontWeight:600 }}>{isEn?"Down Payment":"首付"}</span>
                <span style={{ fontSize:11, fontWeight:700, fontFamily:MONO, color:C.arm }}>{downPct}% · {fmtD(homePrice * downPct / 100)}</span>
              </div>
              <input type="range" min={3} max={50} step={1} value={downPct} onChange={e => setDownPct(Number(e.target.value))}
                style={{ width:"100%", height:2, borderRadius:0, outline:"none", appearance:"none", WebkitAppearance:"none", cursor:"pointer", background:`linear-gradient(to right,${C.arm} 0%,${C.arm} ${((downPct-3)/47)*100}%,${C.borderLight} ${((downPct-3)/47)*100}%,${C.borderLight} 100%)` }} />
            </div>
            <div style={{ padding:"5px 10px", background:C.armLight, borderRadius: 0, fontSize:10, fontWeight:600, color:C.arm, textAlign:"center" }}>{isEn?"Loan":"贷款"}: {fmtD(loanAmount)}</div>
          </> : <AmountSlider label={isEn?"Loan Amount":"贷款金额"} value={directLoan} onChange={setDirectLoan} min={100000} max={2000000} step={25000} color={C.arm} />}
          <div style={{ height:8 }} />
          {/* Fixed vs ARM — compact side-by-side cards */}
          <div style={{ display:"flex", gap:8, marginBottom:14 }}>
            {[
              {
                kind: "fixed",
                title: isEn?"■ Fixed":"■ 固定",
                bg: C.fixedLight,
                color: C.fixed,
                rate: fixedQuoteRate, setRate: setFixedQuoteRate,
                points: fixedPoints, setPoints: setFixedPoints,
                stats: [
                  { l: isEn?"Base":"基础", v: fmtP(fixedBaseRate) },
                  { l: "APR", v: fmtP(fixedAPR) },
                  { l: isEn?"Cost":"费用", v: fmtD(fixedPointCost) },
                  fixBE && { l: isEn?"B/E":"回本", v: fixBE.years+(isEn?"y":"年") },
                ].filter(Boolean),
              },
              {
                kind: "arm",
                title: isEn?"◆ ARM":"◆ ARM",
                bg: C.armLight,
                color: C.arm,
                rate: armQuoteRate, setRate: setArmQuoteRate,
                points: armPoints, setPoints: setArmPoints,
                stats: [
                  { l: isEn?"Base":"基础", v: fmtP(armBaseRate) },
                  { l: "APR", v: fmtP(armAPR) },
                  { l: isEn?"Cost":"费用", v: fmtD(armPointCost) },
                  armBE && { l: isEn?"B/E":"回本", v: armBE.years+(isEn?"y":"年") },
                ].filter(Boolean),
              },
            ].map(card => {
              const rateMin = card.kind==="fixed"?2:2, rateMax = card.kind==="fixed"?10:9;
              const ratePct = ((card.rate - rateMin) / (rateMax - rateMin)) * 100;
              const pointsPct = (card.points / 3) * 100;
              return (
                <div key={card.kind} style={{ flex:1, minWidth:0, padding:"8px 10px 9px", background:card.bg, borderRadius:0, border:`0.5px solid ${C.ink}` }}>
                  <div style={{ fontSize:10, fontWeight:700, color:card.color, marginBottom:7, letterSpacing:1.5, textTransform:"uppercase", borderBottom:`0.5px solid ${card.color}60`, paddingBottom:3 }}>{card.title}</div>
                  {/* Rate slider row */}
                  <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:5 }}>
                    <span style={{ fontSize:9, color:C.textSec, fontWeight:600, letterSpacing:0.5, minWidth:22 }}>{isEn?"Rate":"利率"}</span>
                    <input type="range" min={rateMin} max={rateMax} step={0.001} value={card.rate} onChange={e=>card.setRate(Number(e.target.value))}
                      style={{ flex:1, minWidth:0, height:2, borderRadius:0, outline:"none", appearance:"none", WebkitAppearance:"none", cursor:"pointer", background:`linear-gradient(to right,${card.color} 0%,${card.color} ${ratePct}%,${C.borderLight} ${ratePct}%,${C.borderLight} 100%)` }} />
                    <span style={{ fontSize:11, fontWeight:700, fontFamily:MONO, color:card.color, minWidth:48, textAlign:"right", fontVariantNumeric:"tabular-nums", letterSpacing:-0.3 }}>{card.rate.toFixed(3)}%</span>
                  </div>
                  {/* Points slider row */}
                  <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:7, paddingBottom:6, borderBottom:`0.5px solid ${card.color}40` }}>
                    <span style={{ fontSize:9, color:C.textSec, fontWeight:600, letterSpacing:0.5, minWidth:22 }}>{isEn?"Pts":"买点"}</span>
                    <input type="range" min={0} max={3} step={0.125} value={card.points} onChange={e=>card.setPoints(Number(e.target.value))}
                      style={{ flex:1, minWidth:0, height:2, borderRadius:0, outline:"none", appearance:"none", WebkitAppearance:"none", cursor:"pointer", background:`linear-gradient(to right,${card.color} 0%,${card.color} ${pointsPct}%,${C.borderLight} ${pointsPct}%,${C.borderLight} 100%)` }} />
                    <span style={{ fontSize:11, fontWeight:700, fontFamily:MONO, color:card.color, minWidth:48, textAlign:"right", fontVariantNumeric:"tabular-nums" }}>{card.points.toFixed(card.points%1===0?0:3).replace(/0$/,"").replace(/\.$/,"")}</span>
                  </div>
                  {/* Stats 2-col grid */}
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", columnGap:8, rowGap:2 }}>
                    {card.stats.map(s => (
                      <div key={s.l} style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", fontSize:9, fontFamily:MONO }}>
                        <span style={{ color:C.textSec, letterSpacing:0.3 }}>{s.l}</span>
                        <b style={{ color:card.color, fontFamily:MONO, fontSize:9.5, letterSpacing:-0.2 }}>{s.v}</b>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
          {/* ARM Type */}
          <div style={{ marginBottom:10 }}>
            <div style={{ fontSize:10, color:C.ink, fontWeight:700, letterSpacing:1.5, textTransform:"uppercase", marginBottom:5 }}>{isEn?"ARM Type":"ARM类型"}</div>
            <div style={{ display:"flex", gap:4, background:"transparent", borderBottom:`0.5px solid ${C.ink}`, padding:0 }}>
              {ARM_TYPES.map((t,i)=>{const a=i===armTypeIdx;return(
                <button key={t.label} onClick={()=>setArmTypeIdx(i)} style={{ flex:1, padding:"5px 2px 6px", borderRadius: 0, border:"none", cursor:"pointer", background:a?C.ink:"transparent", color:a?C.paper:C.textSec, fontSize:11, fontWeight:a?700:500, fontFamily:FONT, lineHeight:1.2 }}><div>{t.label}</div><div style={{ fontSize:8, opacity:0.6, marginTop:1 }}>{isEn?(t.descEn||t.desc):t.desc}</div></button>
              );})}
            </div>
          </div>
          {/* Scenarios */}
          <div style={{ fontSize:10, color:C.ink, fontWeight:700, letterSpacing:1.5, textTransform:"uppercase", marginBottom:5 }}>{isEn?"Rate Scenarios":"利率情景"}</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr 1fr", gap:4 }}>
            {SCENARIOS.map(s=>{const a=s.key===scenario;return(
              <button key={s.key} onClick={()=>setScenario(s.key)} style={{ padding:"6px 2px", borderRadius: 0, cursor:"pointer", border: `0.5px solid ${C.ink}`, background:a?s.color:"transparent", fontFamily:FONT, display:"flex", flexDirection:"column", alignItems:"center", gap:1 }}>
                <div style={{ fontSize:12, filter:a?"grayscale(1) brightness(3)":"none", opacity:a?0.95:0.7 }}>{s.icon}</div>
                <div style={{ fontSize:9, fontWeight:a?700:500, color:a?C.paper:C.ink, letterSpacing:a?0.5:0 }}>{isEn?s.labelEn:s.label}</div>
                <div style={{ fontSize:7, color:a?C.paper:C.textMuted, opacity:a?0.85:0.7, fontFamily:SERIF, fontStyle:"italic", lineHeight:1.2 }}>{isEn?s.descEn:s.desc}</div>
              </button>
            );})}
          </div>
          <div style={{ marginTop:8, padding:"5px 10px", background:C.cardAlt, borderRadius: 0, fontSize:10, color:C.textDim, fontFamily:MONO }}>Cap: ±{periodicCap}% · {isEn?"Lifetime":"终身"}+{lifetimeCap}%</div>
        </div>
      )}

      {/* Stats */}
      <div style={{ padding:"6px 12px 0", display:"flex", gap:6 }}>
        <StatCard label={isEn?"ARM Pmt":"ARM月供"} value={fmtD(cur.payment)} sub={`利率 ${fmtP(cur.rate)}`} color={C.arm} />
        <StatCard label={isEn?"Fixed Pmt":"固定月供"} value={fmtD(curF.payment)} sub={`利率 ${fmtP(curF.rate)}`} color={C.fixed} />
        <StatCard label={isEn?"Diff":"月供差"} value={(diff>=0?"+":"")+fmtD(diff)} sub={diff>0?(isEn?"ARM+":"ARM更贵"):(isEn?"ARM-":"ARM更省")} color={diff>0?C.danger:C.arm} highlight={diff>0?C.dangerLight:C.armLight} />
      </div>
      <div style={{ padding:"6px 12px 0", display:"flex", gap:6 }}>
        <StatCard label="ARM APR" labelEn={isEn?"w/ pts":"含买点"} value={fmtP(armAPR)} sub={`票面${fmtP(armQuoteRate)} · ${armPoints}pt`} color={C.arm} />
        <StatCard label="固定 APR" labelEn={isEn?"w/ pts":"含买点"} value={fmtP(fixedAPR)} sub={`票面${fmtP(fixedQuoteRate)} · ${fixedPoints}pt`} color={C.fixed} />
      </div>

      {/* Chart */}
      <div style={{ padding:"6px 12px 0" }}>
        <div style={{ background:C.card, border:`0.5px solid ${C.ink}`, borderRadius: 0, padding:"8px 4px 4px" }}>
          <div style={{ display:"flex", margin:"0 8px 5px", justifyContent:"space-between", alignItems:"center" }}>
            <div style={{ display:"flex", flex:1, background:"transparent", borderBottom:`0.5px solid ${C.ink}`, padding:0 }}>
              {[{key:"rate",l:isEn?"Rates":"利率走势"},{key:"payment",l:isEn?"Payment":"月供对比"},{key:"interest",l:isEn?"Interest":"累计利息"}].map(t=>{const a=t.key===chartMode;return(
                <button key={t.key} onClick={()=>setChartMode(t.key)} style={{ flex:1, padding:"4px 2px", borderRadius: 0, border:"none", cursor:"pointer", background:a?C.ink:"transparent", fontFamily:FONT, fontSize:10, fontWeight:a?700:500, color:a?C.paper:C.textSec }}>{t.l}</button>
              );})}
            </div>
            <button onClick={()=>setShowRefLine(!showRefLine)} style={{ marginLeft:6, width:24, height:24, borderRadius: 0, border:`0.5px solid ${showRefLine?C.arm:C.border}`, background:showRefLine?C.armLight:"transparent", cursor:"pointer", fontSize:12, display:"flex", alignItems:"center", justifyContent:"center", color:showRefLine?C.arm:C.textMuted }}>{showRefLine?"\u2503":"\u2503"}</button>
          </div>
          <div style={{ position:"relative" }}>
            <Recharts.ResponsiveContainer width="100%" height={200}>
              <Recharts.AreaChart data={chartData} margin={{top:5,right:14,bottom:5,left:-8}}>
                <defs><linearGradient id="gA" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={C.arm} stopOpacity={0.18}/><stop offset="95%" stopColor={C.arm} stopOpacity={0.01}/></linearGradient>
                <linearGradient id="gF" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={C.fixed} stopOpacity={0.12}/><stop offset="95%" stopColor={C.fixed} stopOpacity={0.01}/></linearGradient></defs>
                <Recharts.CartesianGrid stroke={C.border} strokeDasharray="3 3" vertical={false}/>
                <Recharts.XAxis dataKey="month" tick={{fontSize:10,fill:C.textMuted}} tickLine={false} axisLine={false} ticks={[1,60,120,180,240,300,360]} tickFormatter={v=>`${Math.ceil(v/12)}${isEn?"yr":"年"}`}/>
                <Recharts.YAxis domain={[chartYRange.min, chartYRange.max]} tick={{fontSize:10,fill:C.textMuted}} tickLine={false} axisLine={false} tickFormatter={v=>chartMode==="rate"?v.toFixed(1)+"%":v>=1000?"$"+(v/1000).toFixed(0)+"k":"$"+v}/>
                {!showRefLine && <Recharts.Tooltip content={<ChartTip/>}/>}
                <Recharts.ReferenceLine x={fixedMonths} stroke={C.warn} strokeOpacity={0.2} strokeDasharray="2 6"/>
                <Recharts.Area type="monotone" dataKey={ck[1]} stroke={C.fixed} strokeWidth={2} fill="url(#gF)" dot={false}/>
                <Recharts.Area type="monotone" dataKey={ck[0]} stroke={C.arm} strokeWidth={2.5} fill="url(#gA)" dot={false} activeDot={showRefLine?false:{r:4,fill:C.arm,stroke:C.white,strokeWidth:2}}/>
              </Recharts.AreaChart>
            </Recharts.ResponsiveContainer>
            {showRefLine && (() => {
              const armVal = chartMode==="rate"?cur.rate:chartMode==="payment"?cur.payment:cur.totalInterest;
              const fixVal = chartMode==="rate"?curF.rate:chartMode==="payment"?curF.payment:curF.totalInterest;
              const range = chartYRange.max - chartYRange.min || 1;
              let ap = (1 - (armVal - chartYRange.min) / range) * 82 + 4;
              let fp = (1 - (fixVal - chartYRange.min) / range) * 82 + 4;
              ap = Math.max(5, Math.min(78, ap)); fp = Math.max(5, Math.min(78, fp));
              if (Math.abs(ap - fp) < 9) { const mid = (ap + fp) / 2; if (ap < fp) { ap = mid - 5; fp = mid + 5; } else { fp = mid - 5; ap = mid + 5; } }
              const xP = Math.max(12, 11 + ((selectedMonth-1)/359)*82);
              const fl = xP > 65;
              const labelX = fl ? (xP - 1) : Math.max(xP + 1, 14);
              const aT = "ARM " + (chartMode==="rate"?fmtP(armVal):fmtD(armVal));
              const fT = (isEn?"Fix ":"固定 ") + (chartMode==="rate"?fmtP(fixVal):fmtD(fixVal));
              return <div style={{ position:"absolute", top:0, bottom:0, left:0, right:0, pointerEvents:"none" }}>
                <div style={{ position:"absolute", top:"4%", bottom:"13%", left:xP+"%", width:1.5, background:C.arm, opacity:0.4 }} />
                <div style={{ position:"absolute", bottom:"11%", left:xP+"%", transform:"translateX(-50%)", background:C.ink, color:C.paper, borderRadius:0, padding:"1px 5px", fontSize:8, fontWeight:700, fontFamily:SERIF, lineHeight:"13px" }}>Y{yr}</div>
                <div style={{ position:"absolute", top:ap+"%", left:labelX+"%", transform:fl?"translateX(-100%)":"none", background:C.paper, border:"1px solid "+C.arm, borderRadius: 0, padding:"0 4px", fontSize:7, fontWeight:700, color:C.arm, whiteSpace:"nowrap", lineHeight:"12px" }}>{aT}</div>
                <div style={{ position:"absolute", top:fp+"%", left:labelX+"%", transform:fl?"translateX(-100%)":"none", background:C.paper, border:"1px solid "+C.fixed, borderRadius: 0, padding:"0 4px", fontSize:7, fontWeight:700, color:C.fixed, whiteSpace:"nowrap", lineHeight:"12px" }}>{fT}</div>
              </div>;
            })()}
          </div>
          <div style={{ display:"flex", justifyContent:"center", gap:16, padding:"2px 0" }}>
            {[{c:C.arm,l:"ARM"},{c:C.fixed,l:isEn?"30yr Fixed":"30年固定"}].map(x=><div key={x.l} style={{ display:"flex", alignItems:"center", gap:4 }}><div style={{ width:12, height:2, borderRadius: 0, background:x.c }}/><span style={{ fontSize:10, color:C.textDim }}>{x.l}</span></div>)}
          </div>
          <div style={{ margin:"3px 6px 0", padding:"5px 10px", background:C.cardAlt, borderRadius: 0 }}>
            <MonthScrubber month={selectedMonth} maxMonth={totalMonths} onChange={setSelectedMonth} fixedMonths={fixedMonths} en={isEn} />
          </div>
        </div>
      </div>

      {/* Total Cost */}
      <div style={{ padding:"6px 12px 0" }}>
        <div style={{ background:C.card, border:`0.5px solid ${C.ink}`, borderRadius: 0, padding:"10px 12px" }}>
          <div style={{ fontSize:10, fontWeight:700, letterSpacing:1.5, textTransform:"uppercase", color:C.ink, marginBottom:8 }}>{isEn?"Total Cost ":"累计总成本 "}<span style={{ fontSize:9, color:C.textMuted, fontWeight:400, letterSpacing:0 }}>{`Y${yr} M${mo}`}</span></div>
          <div style={{ display:"flex", gap:10 }}>
            {[{l:"ARM",v:armTC,iv:cur.totalInterest,p:armPointCost,c:C.arm},{l:isEn?"Fixed":"固定",v:fixTC,iv:curF.totalInterest,p:fixedPointCost,c:C.fixed}].map(x=>{const mx=Math.max(armTC,fixTC);return(
              <div key={x.l} style={{ flex:1 }}><div style={{ fontSize:10, color:x.c, fontWeight:600, marginBottom:3 }}>{x.l}</div>
              <div style={{ height:7, background:C.cardAlt, borderRadius: 0, overflow:"hidden" }}><div style={{ height:"100%", borderRadius: 0, background:`linear-gradient(90deg,${x.c}BB,${x.c})`, width:`${(x.v/mx)*100}%`, transition:"width .3s" }}/></div>
              <div style={{ fontSize:14, fontWeight:700, color:x.c, fontFamily: SERIF, marginTop:3, letterSpacing:-0.2 }}>{fmtD(x.v)}</div>
              <div style={{ fontSize:8, color:C.textMuted, marginTop:1 }}>{isEn?"Int ":"利息"}{fmtD(x.iv)}{x.p>0?` + ${isEn?"pts ":"买点"}${fmtD(x.p)}`:""}</div></div>
            );})}
          </div>
          <div style={{ marginTop:8, padding:"6px 10px", borderRadius: 0, background:tcDiff>0?C.dangerLight:C.armLight, fontSize:11, fontWeight:600, textAlign:"center", color:tcDiff>0?C.danger:C.arm }}>
            {tcDiff>0?`⚠ ${isEn?"ARM costs more ":"ARM多 "}${fmtD(tcDiff)}`:`✓ ${isEn?"ARM saves ":"ARM省 "}${fmtD(Math.abs(tcDiff))}`}<span style={{ fontSize:9, fontWeight:400, opacity:0.7 }}>{isEn?" (incl. pts)":"（含买点）"}</span>
          </div>
        </div>
      </div>

      <div style={{ padding:"6px 12px 0" }}><GlossarySection terms={ARM_GLOSSARY} en={isEn} /></div>
      <BrandingFooter />

      {/* Bottom Bar */}
      <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:480, background:`linear-gradient(180deg,transparent 0%,${C.bg} 35%)`, paddingTop:12 }}>
        <div style={{ background:C.paper, borderTop:`0.5px solid ${C.ink}`, padding:"6px 12px 8px", display:"flex", alignItems:"center" }}>
          {[{l:isEn?"ARM":"ARM月供",v:fmtD(cur.payment),c:C.arm},null,{l:isEn?"Fixed":"固定月供",v:fmtD(curF.payment),c:C.fixed},null,{l:isEn?"Diff":"差额",v:(diff>=0?"+":"")+fmtD(diff),c:diff>0?C.danger:C.arm}].map((item,i)=>{
            if(!item) return <div key={i} style={{ width:0.5, height:22, background:C.border }}/>;
            return <div key={i} style={{ flex:1, textAlign:"center" }}><div style={{ fontSize:8, color:C.textMuted, fontWeight:600, letterSpacing:1, textTransform:"uppercase", marginBottom:1 }}>{item.l}</div><div style={{ fontSize:13, fontWeight:700, fontFamily: SERIF, color:item.c, letterSpacing:-0.2 }}>{item.v}</div></div>;
          })}
        </div>
      </div>
    </div>
  );
}

    }
    return Math.round(price * rate);
  };
  /* CA documentary transfer tax (county + city).
     County: $1.10/$1,000 = 0.11% (buyer usually doesn't pay in SoCal; NorCal often split).
     This is minor for buyer side; sellers typically cover it. Set to $0 by default for buyer. */
  const calcCATransferTax = () => 0;

  const isNYC = state === "NY" && (locationPreset === "nyc_class1" || locationPreset === "nyc_condo");
  const prepaidInterestDays = 15; // mid-month closing avg
  const prepaidInterestDaily = (loanAmount * rate / 100) / 365;

  /* LE Section structure — each item has {key, label, labelEn, default, note}.
     Extracted as a pure helper so we can produce items for ANY scenario (A/B/C), 
     not just the top-level one — each scenario can have its own editable LE. */
  const makeClosingItemsRaw = (sp, sLoan, sPoints, sRate, sInsMonthly, sTaxMonthly, sLtv) => {
    const sMainPointCost = Math.round(sPoints * 0.01 * sLoan);
    const sPrepaidDaily = (sLoan * sRate / 100) / 365;
    return {
      // A. Origination Charges
      a_points: { section: "A", label: "买点费 Points", labelEn: "Points", default: sMainPointCost, note: sPoints > 0 ? `${sPoints}pt × ${fmtD(sLoan)}` : "无" },
      a_origination: { section: "A", label: "贷款开立费", labelEn: "Origination / Commitment Fee", default: Math.round(sLoan * 0.005), note: isEn?"~0.5% of loan":"约贷款额的0.5%" },
      a_application: { section: "A", label: "申请费", labelEn: "Application Fee", default: 300 },
      // B. Services You Cannot Shop For
      b_appraisal: { section: "B", label: "估价费", labelEn: "Appraisal", default: 900 },
      b_credit: { section: "B", label: "信用报告", labelEn: "Credit Report", default: 200 },
      b_flood: { section: "B", label: "洪水证明", labelEn: "Flood Certification", default: 15 },
      b_tax_service: { section: "B", label: "税务监察", labelEn: "Tax Service Fee", default: 80 },
      b_condo_q: { section: "B", label: propType==="condo"||propType==="coop" ? "Condo问卷" : "(不适用)", labelEn: propType==="condo"||propType==="coop" ? "Condo Questionnaire" : "(N/A)", default: propType==="condo"||propType==="coop" ? 600 : 0 },
      // C. Services You Can Shop For
      c_title_lender: { section: "C", label: "贷款人产权保险", labelEn: "Lender's Title Insurance", default: Math.round(sLoan * 0.004) },
      c_title_closing: { section: "C", label: "过户/结算费", labelEn: "Settlement / Closing Fee", default: 575 },
      c_title_docprep: { section: "C", label: "文件准备", labelEn: "Doc Prep", default: 100 },
      c_attorney: { section: "C", label: "买家律师费", labelEn: "Buyer Attorney", default: state==="NY" ? 2500 : 1000 },
      // E. Taxes and Other Government Fees
      e_recording: { section: "E", label: "记录费", labelEn: "Recording Fees", default: 250 },
      e_mrt: { section: "E", label: state==="NY" ? (isNYC?"NYC抵押税 (MRT)":"NY州抵押税") : (state==="AL"||state==="FL"||state==="MN"||state==="OK"||state==="TN"||state==="VA") ? "抵押税" : "(不适用)", labelEn: state==="NY" ? (isNYC?"NYC Mortgage Recording Tax":"NY State Mortgage Tax") : "Mortgage Tax", default: state==="NY" ? calcMRT(sLoan, isNYC, propType) : 0, note: state==="NY" ? (isNYC ? (sLoan >= 500000 ? "1.925%" : "1.8%") + " − $30" : "约1.05%") : "" },
      e_transfer: { section: "E", label: state==="CA" ? "CA过户税" : (state==="NY"&&!isNYC) ? "NY州买方记录税" : "买方转让税", labelEn: "Buyer Transfer Tax", default: state==="CA" ? calcCATransferTax() : 0 },
      e_mansion: { section: "E", label: "豪宅税 Mansion Tax", labelEn: "Mansion Tax", default: state==="NY" ? calcMansionTax(sp, isNYC) : 0, note: state==="NY" && sp >= 1000000 ? (isNYC?"NYC累进1-3.9%":"NY州1%") : (sp < 1000000 ? "<$1M，无" : "") },
      // F. Prepaids
      f_homeowner_ins: { section: "F", label: "房屋保险 (12月)", labelEn: "Homeowner's Ins. Premium (12mo)", default: sInsMonthly * 12 },
      f_prepaid_interest: { section: "F", label: `首月利息 (${prepaidInterestDays}天)`, labelEn: `Prepaid Interest (${prepaidInterestDays}d)`, default: Math.round(sPrepaidDaily * prepaidInterestDays) },
      // G. Initial Escrow Payment at Closing — optional if LTV ≤ 80% (most lenders allow waiver; FHA requires escrow)
      // LTV > 80% forces escrow ON regardless of toggle.
      g_escrow_tax: { section: "G", label: "地税押金 (3月)", labelEn: "Property Tax Escrow (3mo)", default: (includeEscrow || sLtv > 80) ? sTaxMonthly * 3 : 0 },
      g_escrow_ins: { section: "G", label: "保险押金 (3月)", labelEn: "Insurance Escrow (3mo)", default: (includeEscrow || sLtv > 80) ? sInsMonthly * 3 : 0 },
      // H. Other — all optional (user can waive)
      h_title_owner: { section: "H", label: "业主产权保险 (可选)", labelEn: "Owner's Title Policy (optional)", default: includeOwnerTitle ? Math.round(sp * 0.0045) : 0 },
      h_inspection: { section: "H", label: "房屋检查 (可选)", labelEn: "Home Inspection (optional)", default: includeInspection ? 600 : 0 },
    };
  };

  // Helpers to apply overrides + sum up items
  const applyOverrides = (raw, overrides) => Object.fromEntries(
    Object.entries(raw).map(([k, v]) => [k, { ...v, value: overrides[k] != null ? overrides[k] : v.default }])
  );
  const sumItems = (items) => Object.values(items).reduce((sum, it) => sum + (it.value || 0), 0);

  // A (scenario 0) — uses top-level state
  const closingItemsRaw = makeClosingItemsRaw(homePrice, loanAmount, points, rate, insMonthly, taxMonthly, ltv);
  const closingItems = applyOverrides(closingItemsRaw, closingOverridesMap[0] || {});
  const closingSections = [
    { key: "A", label: isEn?"A. Origination Charges":"A. 贷款开立费" },
    { key: "B", label: isEn?"B. Services You Cannot Shop For":"B. 无法比价的服务" },
    { key: "C", label: isEn?"C. Services You Can Shop For":"C. 可比价的服务" },
    { key: "E", label: isEn?"E. Taxes & Government Fees":"E. 税费与政府费" },
    { key: "F", label: isEn?"F. Prepaids":"F. 预付项" },
    { key: "G", label: isEn?"G. Initial Escrow":"G. 初始托管" },
    { key: "H", label: isEn?"H. Other":"H. 其他" },
  ];
  const closingCost = sumItems(closingItems);

  const mainPointCostIncluded = true; // already in a_points
  const cashToClose = downAmount + closingCost;
  // Monthly total (all shelter costs added together)
  const totalMonthly = Math.round(pi + taxMonthly + insMonthly + pmiMonthly + hoaMonthly + utilityMonthly);
  // Income needed (28% housing ratio)
  const incomeNeeded = Math.round((totalMonthly / 0.28) * 12);

  // === Comparison helper: calculate costs for any (price, down%, rate, points) combo ===
  // Accepts optional per-scenario overrides (ins, hoa, utility, taxRate). If omitted, inherits A-level values.
  const calcScenario = (sp, sd, sr, spts, overrides = {}) => {
    const sPts = spts || 0;
    const sLoan = Math.round(sp * (1 - sd / 100));
    const sDown = sp - sLoan;
    const sLtv = (sLoan / sp) * 100;
    const sPi = pmtCalc(sr, totalMonths, sLoan);
    const sPmiApplies = sLtv > 80 && propType !== "coop";
    const sLtvBucket = sLtv > 95 ? "97" : sLtv > 90 ? "95" : sLtv > 85 ? "90" : "85";
    const sPmiRate = sPmiApplies ? (PMI_RATES[creditScore]?.[sLtvBucket] || 0.73) : 0;
    const sPmi = sPmiApplies ? Math.round(sLoan * sPmiRate / 100 / 12) : 0;
    // Tax: use scenario override if set, else A-level effectiveTaxRate
    const sTaxRate = overrides.taxRateOverride ?? effectiveTaxRate;
    const sTax = propType === "coop" ? 0 : Math.round(sp * sTaxRate / 100 / 12);
    // Insurance: priority = scenario override > A-level insOverride > computed HO-3/HO-6
    const sDwF = sp / 300000;
    const sHo3 = Math.round(stateIns * Math.min(Math.max(sDwF, 0.5), 3));
    const sHo6 = Math.max(300, Math.round(sHo3 * 0.3));
    const sInsDefault = Math.round((propType === "condo" || propType === "coop" ? sHo6 : sHo3) / 12);
    const sIns = overrides.insOverride ?? (insOverride ?? sInsDefault);
    // HOA: priority = scenario override > A-level hoaOverride > type-default
    const sHoaDefault = propType === "sfh" ? 0 : propType === "condo" ? 500 : propType === "townhouse" ? 250 : 1500;
    const sHoa = overrides.hoaOverride ?? (hoaOverride ?? sHoaDefault);
    // Utility: priority = scenario override > A-level utilityMonthly
    const sUtil = overrides.utilityOverride ?? utilityMonthly;
    const sTotal = Math.round(sPi + sTax + sIns + sPmi + sHoa + sUtil);
    // State-aware closing cost for B/C too: MRT + mansion + ~2% other fees
    const sMRT = state === "NY" ? calcMRT(sLoan, isNYC, propType) : 0;
    const sMansion = state === "NY" ? calcMansionTax(sp, isNYC) : 0;
    // Use A's closing/price ratio (excluding MRT/mansion, which are recomputed per scenario) for a more accurate estimate
    // A's "other fees" can be derived when scenarioA_raw already computed; fall back to 2% before first pass
    const sOtherFees = Math.round(sp * 0.02); // lender + title + appraisal + escrow combined estimate
    const sClosing = sMRT + sMansion + sOtherFees;
    const sPointCost = Math.round(sPts * 0.01 * sLoan);
    const sBaseRate = Math.round((sr + sPts * RATE_PER_POINT) * 1000) / 1000;
    const sCash = sDown + sClosing + sPointCost;
    const sIncome = Math.round((sTotal / 0.28) * 12);
    return { price:sp, downPct:sd, rate:sr, points:sPts, baseRate:sBaseRate, loan:sLoan, down:sDown, ltv:sLtv, pi:Math.round(sPi), tax:sTax, ins:sIns, pmi:sPmi, hoa:sHoa, util:sUtil, total:sTotal, pointCost:sPointCost, closing:sClosing, mrt:sMRT, mansion:sMansion, cash:sCash, income:sIncome };
  };
  // Main scenario (A) — override closing/cash with precise LE-based values for consistency with main card
  const scenarioA_raw = calcScenario(homePrice, downPct, rate, points);
  const scenarioA = { ...scenarioA_raw, closing: closingCost, cash: cashToClose };
  // Wrapper: recalc closing/cash for any scenario using that scenario's own LE items (editable per-scenario) with its overrides.
  const calcScenarioAligned = (sp, sd, sr, spts, overrides = {}, idx = null) => {
    const s = calcScenario(sp, sd, sr, spts, overrides);
    const useIdx = idx != null ? idx : 0;
    const rawItems = makeClosingItemsRaw(s.price, s.loan, s.points, s.rate, s.ins, s.tax, s.ltv);
    const sItems = applyOverrides(rawItems, closingOverridesMap[useIdx] || {});
    const sClosing = sumItems(sItems); // includes a_points, MRT, mansion — everything
    const sMrt = state === "NY" ? calcMRT(s.loan, isNYC, propType) : 0;
    const sMansion = state === "NY" ? calcMansionTax(sp, isNYC) : 0;
    // closing already includes points (a_points), so don't add pointCost separately
    const sCash = s.down + sClosing;
    const sIncome = Math.round((s.total / 0.28) * 12);
    return { ...s, closing: sClosing, cash: sCash, mrt: sMrt, mansion: sMansion, income: sIncome, items: sItems };
  };

  // === Per-scenario closing items helper (used by the modal + APR detail for B/C) ===
  // For idx=0 returns A's items (already computed). For 1/2, computes from scenarios[idx-1] params.
  const getScenarioClosingItems = (idx) => {
    if (idx === 0) return closingItems;
    const sc = scenarios[idx - 1];
    if (!sc) return closingItems;
    const ov = { insOverride: sc.insOverride, hoaOverride: sc.hoaOverride, utilityOverride: sc.utilityOverride, taxRateOverride: sc.taxRateOverride };
    const s = calcScenario(sc.price, sc.downPct, sc.rate, sc.points, ov);
    const raw = makeClosingItemsRaw(s.price, s.loan, s.points, s.rate, s.ins, s.tax, s.ltv);
    return applyOverrides(raw, closingOverridesMap[idx] || {});
  };

  const breakdown = [
    { label: isEn?"Principal & Interest":"本金+利息", value: Math.round(pi), color: C.arm, key:"pi" },
    { label: isEn?"Property Tax":"地税", value: taxMonthly, color: C.fixed, key:"tax", hide: propType === "coop" },
    { label: isEn?(propType==="condo"||propType==="coop"?"HO-6 Insurance":"Home Insurance"):(propType==="condo"||propType==="coop"?"HO-6保险":"房屋保险"), value: insMonthly, color: C.purple, key:"ins" },
    { label: "PMI", value: pmiMonthly, color: C.warn, key:"pmi", hide: !pmiApplies },
    { label: isEn?(propType==="coop"?"Maintenance":"HOA"):(propType==="coop"?"Co-op管理费":"HOA"), value: hoaMonthly, color: C.danger, key:"hoa", hide: propType === "sfh" && hoaMonthly === 0 },
    { label: isEn?"Utilities":"公用事业费", value: utilityMonthly, color: C.warn, key:"util", hide: utilityMonthly === 0 },
  ].filter(x => !x.hide);

  const propTypeLabel = (t) => {
    const map = {sfh:isEn?"Single Family":"独立屋",condo:"Condo",coop:"Co-op",townhouse:isEn?"Townhouse":"联排屋"};
    return map[t];
  };

  const genText = () => {
    const L = [];
    const r = isEn;
    L.push(r?"MORTGAGE PAYMENT ESTIMATE":"房贷月供估算");
    L.push((r?"Prepared by Rate Navigator · ":"Rate Navigator 出品 · ") + new Date().toLocaleDateString(r?"en-US":"zh-CN"));
    L.push("");
    // If compare mode, show ABC comparison first
    if (compareMode && scenarios.length >= 1) {
      const allSc = [scenarioA, ...scenarios.map((s, i) => calcScenarioAligned(s.price, s.downPct, s.rate, s.points, { insOverride:s.insOverride, hoaOverride:s.hoaOverride, utilityOverride:s.utilityOverride, taxRateOverride:s.taxRateOverride }, i+1))];
      const labels = ["A", ...scenarios.map((_, i) => String.fromCharCode(66 + i))];
      L.push(r?"═══ SCENARIO COMPARISON ═══":"═══ 方案对比 ═══");
      L.push("");
      const pad = (s, n) => String(s).padEnd(n).slice(0, n);
      const padR = (s, n) => String(s).padStart(n).slice(0, n);
      L.push(pad(r?"Item":"项目", 14) + labels.map(l => padR(l, 13)).join(""));
      L.push("─".repeat(14 + 13 * labels.length));
      const rows = [
        [r?"Home Price":"房价", allSc.map(s => fmtD(s.price))],
        [r?"Down %":"首付", allSc.map(s => s.downPct + "%")],
        [r?"Rate":"利率", allSc.map(s => fmtP(s.rate))],
        [r?"Points":"买点", allSc.map(s => s.points + "pt")],
        [r?"Loan":"贷款", allSc.map(s => fmtD(s.loan))],
        ["P&I", allSc.map(s => fmtD(s.pi))],
        [r?"Tax":"地税", allSc.map(s => fmtD(s.tax))],
        [r?"Ins":"保险", allSc.map(s => fmtD(s.ins))],
        ["PMI", allSc.map(s => fmtD(s.pmi))],
        ["HOA", allSc.map(s => fmtD(s.hoa))],
        [r?"MONTHLY":"月供", allSc.map(s => fmtD(s.total))],
        [r?"Cash Close":"过户现金", allSc.map(s => fmtD(s.cash))],
        [r?"Income":"年收入", allSc.map(s => fmtD(s.income))],
      ];
      rows.forEach(row => {
        L.push(pad(row[0], 14) + row[1].map(v => padR(v, 13)).join(""));
      });
      L.push("");
      // Rate sensitivity note — lender cares about this
      L.push(r?"─── RATE SENSITIVITY ───":"─── 利率敏感度 ───");
      const baseIdx = 0;
      allSc.forEach((s, i) => {
        if (i === baseIdx) return;
        const pDiff = s.total - allSc[baseIdx].total;
        const rDiff = (s.rate - allSc[baseIdx].rate).toFixed(3);
        L.push(`${labels[i]} vs A: ${rDiff>0?"+":""}${rDiff}% ${r?"rate":"利率"} → ${pDiff>0?"+":""}${fmtD(pDiff)}/mo ${r?"payment":"月供"}`);
      });
      L.push("");
    }
    L.push(r?"═══ SCENARIO A (BASELINE) ═══":"═══ 方案A (基准) ═══");
    L.push((r?"Home: ":"房价：") + fmtD(homePrice) + " | " + (r?"Down: ":"首付：") + downPct + "% (" + fmtD(downAmount) + ") | " + (r?"Loan: ":"贷款：") + fmtD(loanAmount));
    L.push((r?"Rate: ":"利率：") + rate + "% | " + (r?"Term: ":"期限：") + termYears + (r?"yr":"年") + " | LTV: " + ltv.toFixed(1) + "%");
    L.push((r?"Type: ":"类型：") + propTypeLabel(propType) + " | " + (r?"State: ":"州：") + state + " (" + (isNYC?"NYC":currentPreset.l) + ", " + effectiveTaxRate.toFixed(2) + "% " + (r?"eff.":"有效") + ")");
    if (points > 0) L.push((r?"Points: ":"买点：") + points + "pt (" + fmtD(mainPointCost) + "), " + (r?"base rate ":"基础利率 ") + (rate+points*RATE_PER_POINT).toFixed(3) + "% → " + rate.toFixed(3) + "%");
    L.push("");
    L.push(r?"─── MONTHLY BREAKDOWN ───":"─── 月供明细 ───");
    breakdown.forEach(b => L.push("  " + b.label + ": " + fmtD(b.value)));
    L.push("  ─────────────");
    L.push("  " + (r?"TOTAL: ":"总计：") + fmtD(totalMonthly) + "/mo");
    L.push("");
    // LE-style closing cost breakdown
    L.push(r?"─── CLOSING COSTS (LE STYLE) ───":"─── 过户费明细 (LE格式) ───");
    closingSections.forEach(sec => {
      const items = Object.entries(closingItems).filter(([k, it]) => it.section === sec.key && (it.value > 0 || it.default > 0));
      if (items.length === 0) return;
      const secTotal = items.reduce((s, [k, it]) => s + (it.value || 0), 0);
      if (secTotal === 0) return;
      L.push(sec.label + " ................. " + fmtD(secTotal));
      items.forEach(([k, it]) => {
        if (it.value > 0) L.push("  · " + (r?(it.labelEn||it.label):it.label) + (it.note?" ("+it.note+")":"") + ": " + fmtD(it.value));
      });
    });
    L.push("  ─────────────");
    L.push("  J. " + (r?"TOTAL CLOSING: ":"过户费合计：") + fmtD(closingCost));
    L.push("");
    L.push((r?"Down Payment: ":"首付：") + fmtD(downAmount));
    L.push((r?"CASH TO CLOSE: ":"过户现金合计：") + fmtD(cashToClose));
    L.push((r?"Income Needed (pre-tax): ":"所需年收入（税前）：") + fmtD(incomeNeeded) + " (" + (r?"28% housing ratio":"按28%房贷收入比") + ")");
    if (pmiApplies) L.push((r?"PMI: ":"PMI: ") + pmiRateAnnual + "% /yr, FICO " + creditScore + "+, " + (r?"cancels at 78% LTV":"LTV降至78%取消"));
    L.push("");
    L.push(r?"For informational purposes only. Consult your MLO.":"仅供参考，请咨询贷款专员。");
    return L.join("\n");
  };

  // === Shared closing-cost modal (renders both on main screen and in report) ===
  // closingModalIdx: null=closed, 0=A, 1=B, 2=C
  const closingModalNode = closingModalIdx != null && (() => {
    const mIdx = closingModalIdx;
    const scenarioLabel = String.fromCharCode(65 + mIdx); // A/B/C
    const scenarioColor = mIdx === 0 ? C.arm : mIdx === 1 ? C.fixed : C.warn;
    // Items for the scenario being edited
    const mItems = getScenarioClosingItems(mIdx);
    const mTotal = sumItems(mItems);
    // LTV for the scenario (affects escrow forcing). For A=top-level ltv; for B/C use calcScenario.
    let mLtv = ltv;
    if (mIdx > 0 && scenarios[mIdx - 1]) {
      const sc = scenarios[mIdx - 1];
      mLtv = (Math.round(sc.price * (1 - sc.downPct/100)) / sc.price) * 100;
    }
    const OPTIONAL_KEYS = ["g_escrow_tax", "g_escrow_ins", "h_title_owner", "h_inspection"];
    const getToggle = (k) => {
      if (k === "g_escrow_tax" || k === "g_escrow_ins") {
        const forced = mLtv > 80;
        return { on: includeEscrow || forced, set: setIncludeEscrow, forced, forcedReason: isEn?"LTV>80% requires escrow":"LTV>80% 必须托管" };
      }
      if (k === "h_title_owner") return { on: includeOwnerTitle, set: setIncludeOwnerTitle };
      if (k === "h_inspection") return { on: includeInspection, set: setIncludeInspection };
      return null;
    };
    const modalSections = closingSections.map(sec => {
      const items = Object.entries(mItems).filter(([k, it]) =>
        it.section === sec.key && (it.value > 0 || OPTIONAL_KEYS.includes(k))
      );
      return { section: sec.key, label: sec.label, items, total: items.reduce((s, [,it]) => s + it.value, 0) };
    }).filter(s => s.items.length > 0);
    // write helper: updates only this scenario's overrides in the map
    const setOverride = (k, v) => setClosingOverridesMap({
      ...closingOverridesMap,
      [mIdx]: { ...(closingOverridesMap[mIdx] || {}), [k]: v }
    });
    const resetOverrides = () => setClosingOverridesMap({
      ...closingOverridesMap,
      [mIdx]: {}
    });
    return (
      <div className="no-print" onClick={()=>setClosingModalIdx(null)} style={{
        position:"fixed", inset:0, background:"rgba(0,0,0,0.5)",
        display:"flex", alignItems:"center", justifyContent:"center",
        zIndex:10000, padding:16, animation:"fadeIn .15s ease-out",
      }}>
        <div onClick={e=>e.stopPropagation()} style={{
          background:C.paper, maxWidth:440, width:"100%", maxHeight:"94vh",
          overflow:"auto", border:`1.5px solid ${C.ink}`, padding:"10px 14px",
          boxShadow:"0 20px 60px rgba(0,0,0,0.35)",
        }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", borderBottom:`1px solid ${C.ink}`, paddingBottom:5, marginBottom:5, position:"sticky", top:-10, background:C.paper, paddingTop:10, marginTop:-10, zIndex:2 }}>
            <div>
              <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                <span style={{ fontSize:9, fontFamily:SERIF, fontStyle:"italic", fontWeight:700, color:C.paper, background:scenarioColor, padding:"1px 6px", letterSpacing:0.5 }}>{isEn?`Scenario ${scenarioLabel}`:`方案 ${scenarioLabel}`}</span>
                <div style={{ fontSize:8, fontWeight:700, letterSpacing:2, textTransform:"uppercase", color:C.textDim }}>{isEn?"Closing Cost · Editable":"过户费 · 可编辑明细"}</div>
              </div>
              <div style={{ fontSize:16, fontFamily:SERIF, fontWeight:700, color:scenarioColor, letterSpacing:-0.3, marginTop:2 }}>{fmtD(mTotal)}</div>
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:5 }}>
              <span style={{ fontSize:7, color:C.textMuted, fontStyle:"italic", fontFamily:SERIF, lineHeight:1.3, textAlign:"right" }}>{isEn?"tap amount · ✓ toggle":"点金额改 · ✓ 开关"}</span>

      const pointCost = pts * 0.01 * _selSens.loan;
      const monthlySave = delta < 0 ? -diff : 0;
      const beMonths = delta < 0 && monthlySave > 0 ? Math.ceil(pointCost / monthlySave) : null;
      return { delta, rate: r, pi: Math.round(newPi), total: newTotal, diff, pointCost, monthlySave, beMonths };

    }).filter(s => s.total > 0);
    // Break-even for points (if any)

      const basePi = pmtCalc(rate + points * RATE_PER_POINT, totalMonths, loanAmount);
      const saving = basePi - pi; // monthly savings from buying down
      if (saving <= 0) return null;
      const months = Math.ceil(mainPointCost / saving);
      return { months, years: (months / 12).toFixed(1), saving: Math.round(saving) };
    })() : null;

                const total = selBreakdown.reduce((s,b)=>s+b.value,0) || 1;
                const r = 46, cx = 60, cy = 60; // bigger donut: 120px box, radius 46

                          const offset = -cum * circ;
                          cum += frac;

  return (
    <div style={{ fontFamily:FONT, background:C.bg, minHeight:"100vh", color:C.text, maxWidth:480, margin:"0 auto", paddingTop:82, paddingBottom:32 }}>

      <div style={{ position:"fixed", top:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:480, zIndex:100, background:C.bg, borderBottom:`1px solid ${C.ink}`, boxShadow: "none" }}>
        <div style={{ padding:"4px 10px 2px", borderBottom:`0.5px solid ${C.ink}` }}><GlobalBar compact /></div>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 16px" }}>

            <div style={{ fontSize:15, fontWeight:600, fontFamily:SERIF, letterSpacing:-0.2 }}>{isEn?"Estimator":"月供估算"}</div>
          </div>
          <div style={{ display:"flex", gap:3 }}>
            {!compareMode && <button onClick={() => { setScenarios([{ id: Date.now(), price: homePrice, downPct, rate, points, insOverride:null, hoaOverride:null, utilityOverride:null, taxRateOverride:null }]); setCompareMode(true); }} style={{ padding:"3px 10px", borderRadius:0, border:`0.5px solid ${C.ink}`, cursor:"pointer", background:"transparent", fontSize:9, color:C.ink, fontFamily:FONT, fontWeight:700, letterSpacing:1, textTransform:"uppercase" }}>{isEn?"+Compare":"+对比"}</button>}
            {compareMode && scenarios.length < 2 && <button onClick={() => setScenarios([...scenarios, { id: Date.now(), price: homePrice, downPct, rate, points, insOverride:null, hoaOverride:null, utilityOverride:null, taxRateOverride:null }])} style={{ padding:"3px 10px", borderRadius:0, border:`0.5px solid ${C.ink}`, cursor:"pointer", background:"transparent", fontSize:9, color:C.ink, fontFamily:FONT, fontWeight:700, letterSpacing:1, textTransform:"uppercase" }}>{isEn?"+C":"+方案C"}</button>}
            {compareMode && <button onClick={() => { setCompareMode(false); setScenarios([{id:1,price:homePrice+100000,downPct,rate:rate,points:0,insOverride:null,hoaOverride:null,utilityOverride:null,taxRateOverride:null}]); }} style={{ padding:"3px 10px", borderRadius:0, border:`0.5px solid ${C.danger}`, cursor:"pointer", background:"transparent", fontSize:9, color:C.danger, fontFamily:FONT, fontWeight:700, letterSpacing:1, textTransform:"uppercase" }}>{isEn?"✕Exit":"✕退出"}</button>}
            <button onClick={() => { setHomePrice(700000); setDownPct(10); setRate(6.00); setPropType("sfh"); setState("NY"); setLocationPreset("nyc_class1"); setCustomTaxRate(null); setCreditScore("760"); setHoaOverride(null); setInsOverride(null); setUtilityMonthly(0); setPoints(0); setCompareMode(false); }} style={{ padding:"3px 8px", borderRadius:0, border:`0.5px solid ${C.ink}`, cursor:"pointer", background:"transparent", fontSize:12, color:C.ink, fontFamily:SERIF }}>↺</button>
          </div>
        </div>
      </div>

      {/* Sticky compact floating payment display */}
      <div style={{ position:"sticky", top:70, zIndex:50, padding:"8px 16px 6px", background:"transparent", }}>
        {!compareMode ? (
          <div style={{ display:"flex", alignItems:"center", gap:12, padding:"10px 14px", background: C.paper, borderRadius: 0, border:`0.5px solid ${C.ink}`, boxShadow: "none" }}>
            <div style={{ flexShrink:0 }}>
              <div style={{ fontSize:8, color:C.textDim, fontWeight:600, letterSpacing:0.8 }}>{isEn?"MONTHLY":"月供"}</div>
              <div style={{ fontSize:22, fontWeight:700, fontFamily: SERIF, color:C.arm, letterSpacing:-0.5, lineHeight:1 }}>{fmtD(totalMonthly)}</div>
            </div>
            <div style={{ flex:1, minWidth:0 }}>

                {breakdown.map((b,i) => <div key={i} style={{ flex:b.value, background:b.color }} title={b.label} />)}
              </div>
              <div style={{ fontSize:9, color:C.textMuted, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{propTypeLabel(propType)} · {state} · {downPct}% {isEn?"down":"首付"}{pmiApplies ? " · PMI" : ""}</div>
            </div>
          </div>
        ) : (
          /* Compare mode: show all scenario totals side by side */
          (() => {
            const allSc = [scenarioA, ...scenarios.map((s, i) => calcScenarioAligned(s.price, s.downPct, s.rate, s.points, { insOverride:s.insOverride, hoaOverride:s.hoaOverride, utilityOverride:s.utilityOverride, taxRateOverride:s.taxRateOverride }, i+1))];

                    <div style={{ fontSize:7, color:C.textMuted }}>{fmtD(sc.price)}</div>

                {allSc.length >= 2 && (() => {
                  const dp = diffPair.split("-").map(Number);
                  const hi = Math.min(dp[0], allSc.length-1), lo = Math.min(dp[1], allSc.length-1);
                  const d = allSc[hi].total - allSc[lo].total;
                  const pairLabel = labels[lo]+"−"+labels[hi];
                  return <div style={{ flex:0.8, textAlign:"center", borderLeft:"1px solid "+C.border, paddingLeft:6 }}>
                    <div style={{ fontSize:8, color:C.textDim, fontWeight:600 }}>{pairLabel}</div>
                    <div style={{ fontSize:14, fontWeight:700, fontFamily:MONO, color:d>0?C.danger:d<0?C.arm:C.textMuted, lineHeight:1.1 }}>{d>0?"+":""}{fmtD(d)}</div>
                    <div style={{ fontSize:7, color:C.textMuted }}>/mo</div>

            setRate: v => setScenarios(scenarios.map(s=>s.id===sc.id?{...s,rate:v}:s)),

        const allCalc = allInputs.map((inp, i) => inp.isA
          ? scenarioA
          : calcScenarioAligned(inp.price, inp.downPct, inp.rate, inp.points, { insOverride:inp.insOverride, hoaOverride:inp.hoaOverride, utilityOverride:inp.utilityOverride, taxRateOverride:inp.taxRateOverride }, i));
        return (

              {allInputs.map((inp, i) => {
                const pf = (v, mn, mx) => ((v - mn) / (mx - mn)) * 100;
                const row = (label, v, mn, mx, st, fn, co, fmt, inputMode, unit) => (
                  <div style={{ marginBottom:3 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:2 }}>
                      <span style={{ fontSize:8, color:C.textSec, fontWeight:600, width:20, flexShrink:0 }}>{label}</span>
                      <input type="range" min={mn} max={mx} step={st} value={v} onChange={e=>fn(Number(e.target.value))} style={{ flex:1, minWidth:0, height:3, borderRadius: 0, outline:"none", appearance:"none", WebkitAppearance:"none", cursor:"pointer", background:`linear-gradient(to right,${co} ${pf(v,mn,mx)}%,${C.border} ${pf(v,mn,mx)}%)` }} />
                      <input type="text" inputMode={inputMode||"numeric"} key={label+i+"-"+v} defaultValue={fmt?fmt(v):v} onBlur={e => { const val=parseFloat(e.target.value); if(!isNaN(val)&&val>=mn&&val<=mx) fn(Math.round(val*1000)/1000); else e.target.value=fmt?fmt(v):v; }}
                        style={{ width:34, padding:"1px 2px", borderRadius: 0, border:"1px solid "+co+"50", fontSize:9, fontFamily:MONO, fontWeight:600, textAlign:"center", outline:"none", background:C.white, color:co, flexShrink:0 }} />
                      {unit && <span style={{ fontSize:7, color:C.textMuted, flexShrink:0 }}>{unit}</span>}
                    </div>
                  </div>
                );
                return (
                  <div
                    key={i}
                    data-slot={i}
                    style={{
                      flex:1, minWidth:0, padding:"5px 4px 4px",
                      background: dragSrc === i ? C.cardAlt : (dragTarget === i && dragSrc !== null && dragSrc !== i ? inp.color+"18" : inp.bg),
                      borderRadius: 0,
                      border: dragSrc === i ? `1.5px dashed ${inp.color}80` : (dragTarget === i && dragSrc !== null && dragSrc !== i ? `2.5px solid ${inp.color}` : "1.5px solid "+inp.color+"25"),
                      overflow:"hidden",
                      transition: dragSrc === null ? "all 0.2s ease-out" : "background 0.15s, border 0.15s",
                      transform: dragTarget === i && dragSrc !== null && dragSrc !== i ? "scale(1.04)" : "scale(1)",
                      opacity: dragSrc === i ? 0.3 : 1,
                    }}
                  >
                    {/* Drag handle header — long-press to pick up, drag over another slot to swap */}
                    <div
                      onPointerDown={(e) => {
                        e.preventDefault();
                        const startX = e.clientX, startY = e.clientY;
                        const startTime = Date.now();
                        // Grab the card element for ghost cloning
                        const cardEl = e.currentTarget.closest("[data-slot]");
                        const rect = cardEl ? cardEl.getBoundingClientRect() : null;
                        let activated = false;
                        const pressTimer = setTimeout(() => {
                          activated = true;
                          setDragSrc(i);
                          if (rect) {
                            setGhostCard({
                              label: inp.label, color: inp.color, bg: inp.bg,
                              price: inp.price, downPct: inp.downPct, rate: inp.rate, points: inp.points,
                              width: rect.width, height: rect.height,
                            });
                            setDragPos({
                              x: startX, y: startY,
                              offsetX: startX - rect.left,
                              offsetY: startY - rect.top,
                            });
                          }
                          try { navigator.vibrate && navigator.vibrate(30); } catch(e) {}
                        }, 350);
                        const move = (ev) => {
                          if (!activated) {
                            if (Math.abs(ev.clientX - startX) > 10 || Math.abs(ev.clientY - startY) > 10) {
                              clearTimeout(pressTimer);
                              window.removeEventListener("pointermove", move);
                              window.removeEventListener("pointerup", up);
                            }
                            return;
                          }
                          // Update ghost position to follow finger
                          setDragPos(prev => prev ? { ...prev, x: ev.clientX, y: ev.clientY } : null);
                          // Find which slot the pointer is over
                          const el = document.elementFromPoint(ev.clientX, ev.clientY);
                          const slotEl = el?.closest("[data-slot]");
                          if (slotEl) {
                            const idx = parseInt(slotEl.getAttribute("data-slot"), 10);
                            if (!isNaN(idx)) setDragTarget(idx);
                          } else {
                            setDragTarget(null);
                          }
                        };
                        const up = (ev) => {
                          clearTimeout(pressTimer);
                          window.removeEventListener("pointermove", move);
                          window.removeEventListener("pointerup", up);
                          if (activated) {
                            const el = document.elementFromPoint(ev.clientX, ev.clientY);
                            const slotEl = el?.closest("[data-slot]");
                            if (slotEl) {
                              const dstIdx = parseInt(slotEl.getAttribute("data-slot"), 10);
                              if (!isNaN(dstIdx) && dstIdx !== i) {
                                // Swap slot i ↔ dstIdx
                                const capture = (idx) => idx === 0
                                  ? { price: homePrice, downPct, rate, points, insOverride, hoaOverride, utilityOverride: null, taxRateOverride: null }
                                  : { price: allInputs[idx].price, downPct: allInputs[idx].downPct, rate: allInputs[idx].rate, points: allInputs[idx].points, insOverride: allInputs[idx].insOverride, hoaOverride: allInputs[idx].hoaOverride, utilityOverride: allInputs[idx].utilityOverride, taxRateOverride: allInputs[idx].taxRateOverride };
                                const srcVals = capture(i);
                                const dstVals = capture(dstIdx);
                                const apply = (idx, vals) => {
                                  if (idx === 0) {
                                    setHomePrice(vals.price); setDownPct(vals.downPct); setRate(vals.rate); setPoints(vals.points);
                                  } else {
                                    const tid = allInputs[idx].id;
                                    setScenarios(prev => prev.map(s => s.id === tid ? { ...s, price: vals.price, downPct: vals.downPct, rate: vals.rate, points: vals.points, insOverride: vals.insOverride, hoaOverride: vals.hoaOverride, utilityOverride: vals.utilityOverride, taxRateOverride: vals.taxRateOverride } : s));
                                  }
                                };
                                apply(i, dstVals);
                                apply(dstIdx, srcVals);
                                // Toast: show "A ↔ C 已交换" for 1.2s
                                const srcLabel = String.fromCharCode(65 + i);
                                const dstLabel = String.fromCharCode(65 + dstIdx);
                                setRecentSwap({ from: srcLabel, to: dstLabel });
                                setTimeout(() => setRecentSwap(null), 1200);
                                try { navigator.vibrate && navigator.vibrate([20, 20, 20]); } catch(e) {}
                              }
                            }
                          }
                          setDragSrc(null);
                          setDragTarget(null);
                          setDragPos(null);
                          setGhostCard(null);
                        };
                        window.addEventListener("pointermove", move);
                        window.addEventListener("pointerup", up);
                      }}
                      style={{
                        display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:3,
                        cursor: "grab", touchAction:"none", userSelect:"none", WebkitUserSelect:"none",
                        padding:"2px 0",
                      }}
                    >
                      <span style={{ display:"flex", alignItems:"center", gap:6 }}>
                        <span style={{
                          fontSize:16, color:inp.color, opacity:0.7,
                          fontFamily:MONO, fontWeight:700, lineHeight:1,
                          display:"inline-block",
                          animation: dragSrc === null ? "dragHandleHint 2.4s ease-in-out 2" : "none",
                        }}>⠿</span>
                        <span style={{ fontSize:11, fontWeight:700, color:inp.color }}>{inp.label}</span>
                      </span>
                      {i > 0 && (
                        <button onPointerDown={(e)=>e.stopPropagation()} onClick={() => { const rem = scenarios.filter(s=>s.id!==inp.id); if(rem.length===0){setCompareMode(false);setScenarios([{id:1,price:homePrice+100000,downPct,rate,points:0,insOverride:null,hoaOverride:null,utilityOverride:null,taxRateOverride:null}]);}else{setScenarios(rem);} }} style={{ background:"none", border:"none", cursor:"pointer", fontSize:10, color:C.textMuted, padding:"0 4px", lineHeight:1 }}>✕</button>
                      )}
                    </div>
                    {/* Price - input with optional sync-to-A button */}
                    <div style={{ display:"flex", alignItems:"center", gap:3, marginBottom:4 }}>
                      <span style={{ fontSize:9, color:C.textSec, fontWeight:600, flexShrink:0 }}>{isEn?"Price":"房价"}</span>
